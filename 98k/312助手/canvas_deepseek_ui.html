<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek AI 助手 - OpenClaw Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }
        
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .response-area {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: none;
        }
        
        .response-area.show {
            display: block;
        }
        
        .response-area h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .response-content {
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
            font-size: 13px;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 DeepSeek AI 助手</h1>
            <p>基于 OpenClaw Canvas 的智能对话系统</p>
        </div>
        
        <div class="content">
            <div id="status-area"></div>
            
            <div class="form-group">
                <label for="userInput">请输入你的问题：</label>
                <textarea 
                    id="userInput" 
                    placeholder="例如：你好，请介绍一下你自己 / 帮我查询客户列表 / 1+1 等于几？"
                ></textarea>
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="sendMessage()">发送</button>
                <button class="btn-secondary" onclick="clearInput()">清空</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在思考中...</p>
            </div>
            
            <div class="response-area" id="responseArea">
                <h3>💬 AI 回复：</h3>
                <div class="response-content" id="responseContent"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 检查服务状态
        checkServiceStatus();
        
        async function checkServiceStatus() {
            try {
                const response = await fetch('http://127.0.0.1:5001/health');
                if (response.ok) {
                    showStatus('✅ DeepSeek 服务运行正常', 'success');
                } else {
                    showStatus('⚠️ 服务响应异常', 'error');
                }
            } catch (error) {
                showStatus('❌ 无法连接到 DeepSeek 服务，请确保 deepseek_mcp_server.py 正在运行', 'error');
            }
        }
        
        async function sendMessage() {
            const userInput = document.getElementById('userInput').value.trim();
            
            if (!userInput) {
                showStatus('⚠️ 请输入问题', 'info');
                return;
            }
            
            // 显示加载动画
            document.getElementById('loading').classList.add('show');
            document.getElementById('responseArea').classList.remove('show');
            
            try {
                const response = await fetch('http://127.0.0.1:5001/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: userInput,
                        use_tools: true
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                // 显示回复
                document.getElementById('responseContent').textContent = data.reply || '没有收到回复';
                document.getElementById('responseArea').classList.add('show');
                
                // 如果有 token 使用信息，也显示出来
                if (data.usage) {
                    const usageInfo = `📊 Token 使用：输入 ${data.usage.prompt_tokens || 0}, 输出 ${data.usage.completion_tokens || 0}`;
                    const usageDiv = document.createElement('div');
                    usageDiv.style.cssText = 'margin-top: 10px; font-size: 12px; color: #666;';
                    usageDiv.textContent = usageInfo;
                    
                    // 清除之前的使用信息
                    const oldUsage = document.getElementById('usageInfo');
                    if (oldUsage) oldUsage.remove();
                    
                    usageDiv.id = 'usageInfo';
                    document.getElementById('responseArea').appendChild(usageDiv);
                }
                
            } catch (error) {
                showStatus(`❌ 请求失败：${error.message}`, 'error');
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }
        
        function clearInput() {
            document.getElementById('userInput').value = '';
            document.getElementById('responseArea').classList.remove('show');
            document.getElementById('status-area').innerHTML = '';
        }
        
        function showStatus(message, type) {
            const statusArea = document.getElementById('status-area');
            statusArea.innerHTML = `<div class="status ${type}">${message}</div>`;
            
            // 3 秒后自动清除
            setTimeout(() => {
                statusArea.innerHTML = '';
            }, 5000);
        }
        
        // 支持按 Ctrl+Enter 发送
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
