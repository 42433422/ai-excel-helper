<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="200" height="200" fill="url(#grad1)"/>
  
  <!-- 图片图标 -->
  <rect x="60" y="60" width="80" height="80" rx="5" fill="#d0d0d0"/>
  <circle cx="100" cy="90" r="15" fill="#a0a0a0"/>
  <path d="M 70 130 L 90 115 L 110 125 L 130 110 L 130 130 L 70 130" fill="#b0b0b0"/>
  
  <!-- 装饰线条 -->
  <rect x="20" y="20" width="160" height="10" rx="5" fill="#e8e8e8"/>
  <rect x="20" y="40" width="120" height="6" rx="3" fill="#f0f0f0"/>
</svg>
