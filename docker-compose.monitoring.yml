version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: xcagi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./k8s/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./k8s/monitoring/prometheus/alert_rules.yml:/etc/prometheus/rules/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: xcagi-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./k8s/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: xcagi-loki
    ports:
      - "3100:3100"
    volumes:
      - ./k8s/monitoring/loki/loki.yml:/etc/loki/loki.yml
      - loki_data:/data
    command: -config.file=/etc/loki/loki.yml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: xcagi-promtail
    volumes:
      - ./k8s/monitoring/loki/promtail.yml:/etc/promtail/promtail.yml
      - ./logs:/var/log/xcagi:ro
    command: -config.file=/etc/promtail/promtail.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: xcagi-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - ./k8s/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  prometheus_data:
  alertmanager_data:
  loki_data:
  grafana_data:
