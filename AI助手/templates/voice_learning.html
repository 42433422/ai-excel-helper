<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>语音模板学习网页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2. }
        
        .header p {
           5rem;
        color: #7f8c8d;
            font-size: 1.1rem;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .tab {
            padding: 15px 30px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: #7f8c8d;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            color: #3498db;
            border-bottom-color: #3498db;
        }
        
        .tab:hover {
            color: #3498db;
            background-color: #f8f9fa;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-col {
            flex: 1;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }
        
        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }
        
        select.form-control {
            cursor: pointer;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-primary {
            background-color: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background-color: #27ae60;
            color: white;
        }
        
        .btn-success:hover {
            background-color: #229954;
            transform: translateY(-2px);
        }
        
        .btn-warning {
            background-color: #f39c12;
            color: white;
        }
        
        .btn-warning:hover {
            background-color: #e67e22;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }
        
        .btn-secondary:hover {
            background-color: #7f8c8d;
            transform: translateY(-2px);
        }
        
        .samples-grid {
            display: grid;
            gap: 20px;
        }
        
        .sample-card {
            background: white;
            border: 1px solid #ecf0f1;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .sample-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }
        
        .sample-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .sample-category {
            background-color: #3498db;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .sample-content {
            margin-bottom: 15px;
        }
        
        .sample-mapping {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .wrong-text {
            background-color: #ffe6e6;
            color: #c0392b;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }
        
        .arrow {
            color: #7f8c8d;
            font-size: 1.2rem;
        }
        
        .correct-text {
            background-color: #e6ffe6;
            color: #27ae60;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }
        
        .sample-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        .sample-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        .search-box {
            margin-bottom: 30px;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #ecf0f1;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: border-color 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .ai-suggestion {
            background-color: #e3f2fd;
            border: 1px solid #2196f3;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }
        
        .ai-suggestion h4 {
            color: #1976d2;
            margin-bottom: 10px;
        }
        
        .suggestion-item {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .suggestion-item:hover {
            background-color: #f5f5f5;
            border-color: #2196f3;
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 20px auto;
                padding: 20px;
            }
            
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            
            .tabs {
                flex-direction: column;
            }
            
            .sample-mapping {
                flex-direction: column;
                text-align: center;
            }
            
            .sample-actions {
                justify-content: center;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fa fa-brain"></i> 语音模板学习网页</h1>
            <p>通过学习语音识别错误来提升AI优化准确率</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('add-sample')">
                <i class="fa fa-plus"></i> 添加学习样板
            </button>
            <button class="tab" onclick="switchTab('manage-samples')">
                <i class="fa fa-cogs"></i> 管理样板
            </button>
            <button class="tab" onclick="switchTab('ai-assist')">
                <i class="fa fa-magic"></i> AI辅助纠正
            </button>
            <button class="tab" onclick="switchTab('test-learning')">
                <i class="fa fa-play-circle"></i> 学习测试
            </button>
            <button class="tab" onclick="switchTab('statistics')">
                <i class="fa fa-chart-bar"></i> 统计信息
            </button>
        </div>
        
        <!-- 添加学习样板 -->
        <div id="add-sample" class="tab-content active">
            <div class="form-section">
                <h2><i class="fa fa-plus-circle"></i> 添加新的学习样板</h2>
                <p style="margin-bottom: 20px; color: #7f8c8d;">添加语音识别错误和正确答案的对应关系</p>
                
                <form id="addSampleForm">
                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label for="wrongInput">错误输入（语音识别结果）</label>
                                <input type="text" id="wrongInput" class="form-control" 
                                       placeholder="例如：武统、瑞星、优雅白" required>
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-group">
                                <label for="correctOutput">正确输出（标准答案）</label>
                                <input type="text" id="correctOutput" class="form-control" 
                                       placeholder="例如：固化剂、蕊芯家私、哑光" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label for="category">分类</label>
                                <select id="category" class="form-control" required>
                                    <option value="">选择分类</option>
                                    <option value="客户单位">客户单位</option>
                                    <option value="产品名称">产品名称</option>
                                    <option value="产品类型">产品类型</option>
                                    <option value="产品特性">产品特性</option>
                                    <option value="产品规格">产品规格</option>
                                    <option value="数量">数量</option>
                                    <option value="其他">其他</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-group">
                                <label for="context">上下文（可选）</label>
                                <input type="text" id="context" class="form-control" 
                                       placeholder="例如：客户名称谐音、产品类型谐音">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa fa-save"></i> 保存学习样板
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="clearForm()">
                            <i class="fa fa-eraser"></i> 清空表单
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="ai-suggestion">
                <h4><i class="fa fa-lightbulb"></i> AI智能建议</h4>
                <p>输入错误输入后，AI会推荐可能的正确答案</p>
                <div id="aiSuggestions"></div>
            </div>
        </div>
        
        <!-- 管理样板 -->
        <div id="manage-samples" class="tab-content">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" 
                       placeholder="搜索学习样板..." onkeyup="searchSamples()">
            </div>
            
            <div id="samplesList" class="samples-grid">
                <!-- 学习样板列表将在这里动态生成 -->
            </div>
        </div>
        
        <!-- AI辅助纠正 -->
        <div id="ai-assist" class="tab-content">
            <div class="form-section">
                <h2><i class="fa fa-magic"></i> AI辅助语音纠错</h2>
                <p style="margin-bottom: 20px; color: #7f8c8d;">输入语音识别结果，AI会智能推荐正确的对应关系</p>
                
                <form id="aiAssistForm">
                    <div class="form-group">
                        <label for="aiTextInput">语音识别文本</label>
                        <textarea id="aiTextInput" class="form-control" rows="4" 
                                  placeholder="输入语音识别结果，例如：武统是5桶批优雅白" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa fa-search"></i> AI智能分析
                        </button>
                    </div>
                </form>
                
                <div id="aiResults" style="margin-top: 20px;">
                    <!-- AI分析结果将在这里显示 -->
                </div>
            </div>
        </div>
        
        <!-- 学习测试 -->
        <div id="test-learning" class="tab-content">
            <div class="form-section">
                <h2><i class="fa fa-play-circle"></i> 学习样板效果测试</h2>
                <p style="margin-bottom: 20px; color: #7f8c8d;">测试学习样板与AI解析的完整效果，查看语音识别纠正和关键信息提取</p>
                
                <form id="testLearningForm">
                    <div class="form-group">
                        <label for="testTextInput">语音识别文本（原始输入）</label>
                        <textarea id="testTextInput" class="form-control" rows="4" 
                                  placeholder="输入语音识别结果，例如：瑞星批白底漆二十桶批优雅白武统pu哑光固化剂武统pu稀释剂180千克一桶" required></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label for="testCustomMode">解析模式</label>
                                <select id="testCustomMode" class="form-control">
                                    <option value="false">标准模式（需要数据库匹配）</option>
                                    <option value="true">自定义模式（支持AI推荐）</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-group">
                                <label for="testNumberMode">编号模式</label>
                                <select id="testNumberMode" class="form-control">
                                    <option value="false">普通模式</option>
                                    <option value="true">编号模式（优先匹配型号）</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <button type="submit" class="btn btn-success">
                            <i class="fa fa-cogs"></i> 测试学习样板效果
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="loadSampleText()">
                            <i class="fa fa-lightbulb-o"></i> 加载示例
                        </button>
                    </div>
                </form>
                
                <div id="testResults" style="margin-top: 20px;">
                    <!-- 测试结果将在这里显示 -->
                </div>
            </div>
        </div>
        
        <!-- 统计信息 -->
        <div id="statistics" class="tab-content">
            <div class="stats-grid" id="statsGrid">
                <!-- 统计信息将在这里动态生成 -->
            </div>
        </div>
    </div>
    
    <div id="alertBox" class="alert"></div>
    
    <script>
        // 全局变量
        let allSamples = [];
        
        // 切换标签页
        function switchTab(tabId) {
            // 隐藏所有标签内容
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // 移除所有标签的激活状态
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示选中的标签内容
            document.getElementById(tabId).classList.add('active');
            
            // 激活选中的标签
            event.target.classList.add('active');
            
            // 加载对应内容
            switch(tabId) {
                case 'manage-samples':
                    loadSamples();
                    break;
                case 'ai-assist':
                    // AI辅助页面无需预加载
                    break;
                case 'test-learning':
                    // 学习测试页面无需预加载
                    break;
                case 'statistics':
                    loadStatistics();
                    break;
            }
        }
        
        // 清空表单
        function clearForm() {
            document.getElementById('addSampleForm').reset();
            document.getElementById('aiSuggestions').innerHTML = '';
        }
        
        // 添加学习样板
        document.getElementById('addSampleForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const wrongInput = document.getElementById('wrongInput').value.trim();
            const correctOutput = document.getElementById('correctOutput').value.trim();
            const category = document.getElementById('category').value;
            const context = document.getElementById('context').value.trim();
            
            if (!wrongInput || !correctOutput || !category) {
                showAlert('请填写所有必填字段', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/voice_learning/add_sample', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        wrong_input: wrongInput,
                        correct_output: correctOutput,
                        category: category,
                        context: context
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('学习样板添加成功！', 'success');
                    clearForm();
                    loadSamples(); // 刷新样板列表
                } else {
                    showAlert('添加失败: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('添加学习样板失败:', error);
                showAlert('添加失败，请重试', 'error');
            }
        });
        
        // 加载学习样板
        async function loadSamples() {
            try {
                const response = await fetch('/api/voice_learning/samples');
                const data = await response.json();
                
                if (data.success) {
                    allSamples = data.samples;
                    displaySamples(allSamples);
                } else {
                    showAlert('加载学习样板失败: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('加载学习样板失败:', error);
                showAlert('加载失败，请重试', 'error');
            }
        }
        
        // 显示学习样板
        function displaySamples(samples) {
            const container = document.getElementById('samplesList');
            
            if (samples.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa fa-inbox"></i>
                        <h3>暂无学习样板</h3>
                        <p>添加第一个学习样板开始训练AI吧！</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = samples.map(sample => `
                <div class="sample-card">
                    <div class="sample-header">
                        <span class="sample-category">${sample.category}</span>
                        <div class="sample-actions">
                            <button class="btn btn-sm btn-warning" onclick="editSample(${sample.id})">
                                <i class="fa fa-edit"></i> 编辑
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteSample(${sample.id})">
                                <i class="fa fa-trash"></i> 删除
                            </button>
                        </div>
                    </div>
                    
                    <div class="sample-content">
                        <div class="sample-mapping">
                            <div class="wrong-text">${sample.wrong_input}</div>
                            <i class="fa fa-arrow-right arrow"></i>
                            <div class="correct-text">${sample.correct_output}</div>
                        </div>
                        ${sample.context ? `<p style="color: #7f8c8d; font-size: 0.9rem;">${sample.context}</p>` : ''}
                    </div>
                    
                    <div class="sample-stats">
                        <span>使用次数: ${sample.usage_count}</span>
                        <span>成功率: ${(sample.success_rate * 100).toFixed(1)}%</span>
                        <span>创建时间: ${new Date(sample.created_at).toLocaleDateString()}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // 搜索学习样板
        function searchSamples() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            if (!query) {
                displaySamples(allSamples);
                return;
            }
            
            const filtered = allSamples.filter(sample => 
                sample.wrong_input.toLowerCase().includes(query) ||
                sample.correct_output.toLowerCase().includes(query) ||
                sample.category.toLowerCase().includes(query) ||
                (sample.context && sample.context.toLowerCase().includes(query))
            );
            
            displaySamples(filtered);
        }
        
        // 删除学习样板
        async function deleteSample(sampleId) {
            if (!confirm('确定要删除这个学习样板吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/voice_learning/samples/${sampleId}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('学习样板删除成功！', 'success');
                    loadSamples(); // 刷新列表
                } else {
                    showAlert('删除失败: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('删除学习样板失败:', error);
                showAlert('删除失败，请重试', 'error');
            }
        }
        
        // 加载统计信息
        async function loadStatistics() {
            try {
                const response = await fetch('/api/voice_learning/statistics');
                const data = await response.json();
                
                if (data.success) {
                    displayStatistics(data.statistics);
                } else {
                    showAlert('加载统计信息失败: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('加载统计信息失败:', error);
                showAlert('加载失败，请重试', 'error');
            }
        }
        
        // 显示统计信息
        function displayStatistics(stats) {
            const container = document.getElementById('statsGrid');
            
            const statCards = [
                {
                    icon: 'fa-database',
                    number: stats.total_samples || 0,
                    label: '学习样板总数',
                    gradient: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
                },
                {
                    icon: 'fa-tags',
                    number: stats.total_categories || 0,
                    label: '分类数量',
                    gradient: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)'
                },
                {
                    icon: 'fa-sync',
                    number: stats.total_applications || 0,
                    label: '总应用次数',
                    gradient: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)'
                },
                {
                    icon: 'fa-percentage',
                    number: `${((stats.average_success_rate || 0) * 100).toFixed(1)}%`,
                    label: '平均成功率',
                    gradient: 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)'
                }
            ];
            
            container.innerHTML = statCards.map(stat => `
                <div class="stat-card" style="background: ${stat.gradient}">
                    <div class="stat-number">${stat.number}</div>
                    <div class="stat-label">
                        <i class="fa ${stat.icon}"></i> ${stat.label}
                    </div>
                </div>
            `).join('');
        }
        
        // AI辅助分析
        document.getElementById('aiAssistForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const text = document.getElementById('aiTextInput').value.trim();
            
            if (!text) {
                showAlert('请输入语音识别文本', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/voice_learning/ai_assist', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayAIResults(data);
                } else {
                    showAlert('AI分析失败: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('AI分析失败:', error);
                showAlert('AI分析失败，请重试', 'error');
            }
        });
        
        // 显示AI分析结果
        function displayAIResults(data) {
            const container = document.getElementById('aiResults');
            
            let html = '<h3><i class="fa fa-lightbulb"></i> AI分析结果</h3>';
            
            if (data.suggestions && data.suggestions.length > 0) {
                html += '<div class="ai-suggestion">';
                html += '<h4>可能的纠正建议：</h4>';
                
                data.suggestions.forEach(suggestion => {
                    html += `
                        <div class="suggestion-item" onclick="applySuggestion('${suggestion.original}', '${suggestion.corrected}')">
                            <strong>"${suggestion.original}"</strong> → <strong>"${suggestion.corrected}"</strong>
                            <br><small>置信度: ${(suggestion.confidence * 100).toFixed(1)}%</small>
                        </div>
                    `;
                });
                
                html += '</div>';
            }
            
            if (data.corrected_text) {
                html += '<div class="ai-suggestion">';
                html += '<h4>AI优化后的文本：</h4>';
                html += `<div class="sample-mapping">`;
                html += `<div class="wrong-text">${text}</div>`;
                html += `<i class="fa fa-arrow-right arrow"></i>`;
                html += `<div class="correct-text">${data.corrected_text}</div>`;
                html += `</div>`;
                html += '</div>';
            }
            
            container.innerHTML = html;
        }
        
        // 应用建议
        function applySuggestion(original, corrected) {
            document.getElementById('wrongInput').value = original;
            document.getElementById('correctOutput').value = corrected;
            document.getElementById('category').value = 'AI建议';
            
            showAlert(`已填入建议: "${original}" → "${corrected}"`, 'success');
        }
        
        // 学习测试表单处理
        document.getElementById('testLearningForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const text = document.getElementById('testTextInput').value.trim();
            const customMode = document.getElementById('testCustomMode').value === 'true';
            const numberMode = document.getElementById('testNumberMode').value === 'true';
            
            if (!text) {
                showAlert('请输入语音识别文本', 'error');
                return;
            }
            
            // 显示加载状态
            const resultContainer = document.getElementById('testResults');
            resultContainer.innerHTML = '<div class="alert alert-success">正在测试学习样板效果...</div>';
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        order_text: text,
                        template_name: 'default',
                        custom_mode: customMode,
                        number_mode: numberMode
                    })
                });
                
                if (response.status_code === 200) {
                    const data = await response.json();
                    displayTestResults(data, text);
                } else {
                    showAlert('测试失败：' + response.status_code, 'error');
                }
            } catch (error) {
                console.error('测试失败:', error);
                showAlert('测试失败，请重试', 'error');
            }
        });
        
        // 显示测试结果
        function displayTestResults(data, originalText) {
            const resultContainer = document.getElementById('testResults');
            
            if (data.success) {
                let html = '<div class="alert alert-success"><strong>测试成功！</strong></div>';
                
                // 学习样板应用情况
                const learningInfo = data.learning_applied || {};
                if (learningInfo.corrections_count > 0) {
                    html += '<div class="ai-suggestion">';
                    html += '<h4><i class="fa fa-magic"></i> 学习样板应用效果</h4>';
                    html += '<div class="sample-mapping">';
                    html += '<div class="wrong-text">' + learningInfo.original_text + '</div>';
                    html += '<i class="fa fa-arrow-right arrow"></i>';
                    html += '<div class="correct-text">' + learningInfo.corrected_text + '</div>';
                    html += '</div>';
                    html += '<p><strong>应用了 ' + learningInfo.corrections_count + ' 个纠正</strong></p>';
                    
                    const corrections = learningInfo.applied_corrections || [];
                    if (corrections.length > 0) {
                        html += '<h5>具体纠正内容：</h5>';
                        corrections.forEach(correction => {
                            html += '<div class="suggestion-item">';
                            html += '<strong>"' + correction.original + '"</strong> → <strong>"' + correction.corrected + '"</strong>';
                            html += '<br><small>置信度: ' + (correction.confidence * 100).toFixed(1) + '%</small>';
                            html += '</div>';
                        });
                    }
                    html += '</div>';
                } else {
                    html += '<div class="alert alert-warning">本次测试未应用学习样板</div>';
                }
                
                // 解析结果
                const parsedData = data.parsed_data || {};
                html += '<div class="ai-suggestion">';
                html += '<h4><i class="fa fa-cogs"></i> AI解析结果</h4>';
                html += '<p><strong>购买单位:</strong> ' + (parsedData.purchase_unit || '未识别') + '</p>';
                html += '<p><strong>产品数量:</strong> ' + (parsedData.products || []).length + ' 个产品</p>';
                
                if (parsedData.products && parsedData.products.length > 0) {
                    html += '<h5>产品详情：</h5>';
                    parsedData.products.forEach((product, index) => {
                        html += '<div class="suggestion-item">';
                        html += '<strong>产品 ' + (index + 1) + ':</strong> ' + (product.name || '未命名');
                        html += '<br><small>数量: ' + (product.quantity_tins || 0) + '桶 (' + (product.quantity_kg || 0) + 'kg)';
                        if (product.unit_price) {
                            html += ', 单价: ¥' + product.unit_price + ', 总价: ¥' + (product.amount || 0);
                        }
                        html += '</small>';
                        html += '</div>';
                    });
                }
                
                const totalAmount = data.document && data.document.total_amount;
                if (totalAmount) {
                    html += '<p><strong>总金额:</strong> ¥' + totalAmount + '</p>';
                }
                
                html += '</div>';
                
                // 生成文件信息
                const docInfo = data.document;
                if (docInfo && docInfo.filename) {
                    html += '<div class="alert alert-info">';
                    html += '<h4><i class="fa fa-file-excel-o"></i> 生成文件</h4>';
                    html += '<p><strong>文件名:</strong> ' + docInfo.filename + '</p>';
                    if (docInfo.record_id) {
                        html += '<p><strong>记录ID:</strong> ' + docInfo.record_id + '</p>';
                    }
                    html += '</div>';
                }
                
                resultContainer.innerHTML = html;
                
            } else {
                resultContainer.innerHTML = '<div class="alert alert-error"><strong>测试失败:</strong> ' + (data.message || '未知错误') + '</div>';
            }
        }
        
        // 加载示例
        function loadSampleText() {
            const samples = [
                '瑞星批白底漆二十桶批优雅白武统pu哑光固化剂武统pu稀释剂180千克一桶',
                '武统是5桶批优雅白',
                '瑞星批白底漆20桶',
                '武统pu哑光固化剂5桶'
            ];
            
            const randomSample = samples[Math.floor(Math.random() * samples.length)];
            document.getElementById('testTextInput').value = randomSample;
            showAlert('已加载示例文本', 'success');
        }

        // 显示提示信息
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 预加载学习样板
            loadSamples();
        });
    </script>
</body>
</html>
