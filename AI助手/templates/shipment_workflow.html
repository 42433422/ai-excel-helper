<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发货单工作流 - AI助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title .icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .input-group textarea,
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .input-group textarea:focus,
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .input-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }
        
        .result-card {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e8e8e8;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-label {
            color: #666;
            font-size: 14px;
        }
        
        .result-value {
            font-weight: 600;
            color: #333;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .quick-examples {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .quick-example {
            padding: 8px 14px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .quick-example:hover {
            background: #667eea;
            color: white;
        }
        
        .chat-box {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .chat-message {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chat-message.user {
            text-align: right;
        }
        
        .chat-message .bubble {
            display: inline-block;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .chat-message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .chat-message.assistant .bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .chat-message .meta {
            font-size: 11px;
            color: #999;
            margin-top: 6px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .adjustment-form {
            background: #fff;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .adjustment-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .adjustment-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }
        
        .adjustment-row input {
            padding: 10px 12px;
            font-size: 14px;
        }
        
        .product-list {
            margin-top: 16px;
        }
        
        .product-item {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .product-item .number {
            width: 24px;
            height: 24px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }
        
        .product-item .info {
            flex: 1;
        }
        
        .product-item .name {
            font-weight: 600;
            color: #333;
        }
        
        .product-item .detail {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        
        .file-name {
            display: inline-block;
            padding: 8px 12px;
            background: #e8f5e9;
            border-radius: 6px;
            color: #2e7d32;
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 发货单工作流</h1>
            <p>输入订单信息，自动生成发货单文档</p>
        </div>
        
        <!-- 订单输入区域 -->
        <div class="card">
            <div class="card-title">
                <span class="icon">📝</span>
                输入订单信息
            </div>
            
            <!-- Excel同步设置 -->
            <div class="input-group" style="background: #f8f9ff; padding: 16px; border-radius: 10px; margin-bottom: 20px;">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="enableExcelSync" onchange="toggleExcelSync()">
                        <span style="font-weight: 600; color: #333;">📊 自动同步到出货记录Excel</span>
                    </label>
                    <span id="syncStatus" class="status-badge status-pending" style="display: none;">未配置</span>
                </div>
                
                <div id="excelFileSection" style="display: none;">
                    <div style="margin-bottom: 12px;">
                        <label style="display: block; font-size: 14px; color: #666; margin-bottom: 8px;">选择出货记录Excel文件</label>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <button class="btn btn-secondary" onclick="document.getElementById('excelFileInput').click()" style="padding: 10px 20px;">
                                📁 选择文件
                            </button>
                            <input type="file" id="excelFileInput" accept=".xlsx" onchange="handleExcelFileSelect()" style="display: none;">
                            <span id="selectedFileInfo" style="font-size: 13px; color: #666;">未选择文件</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="input-group">
                <label>订单内容</label>
                <textarea id="orderText" placeholder="例如：蕊芯PU哑光黑面漆20公斤"></textarea>
                <div class="hint">支持格式：购买单位 + 产品名称 + 数量（支持公斤和桶）</div>
            </div>
            
            <div class="quick-examples">
                <span class="quick-example" onclick="useExample(this)">蕊芯PU哑光黑面漆20公斤</span>
                <span class="quick-example" onclick="useExample(this)">蕊芯PU净味面漆稀释剂180KG</span>
                <span class="quick-example" onclick="useExample(this)">七彩乐园9803 PE白底漆28KG</span>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="submitOrder()">
                    🚀 生成发货单
                </button>
                <button class="btn btn-secondary" onclick="clearInput()">
                    🗑️ 清空
                </button>
            </div>
        </div>
        
        <!-- 解析结果区域 -->
        <div class="card" id="resultCard" style="display: none;">
            <div class="card-title">
                <span class="icon">✅</span>
                解析结果
            </div>
            
            <div id="resultContent"></div>
            
            <div class="action-buttons" id="actionButtons">
                <button class="btn btn-success" onclick="confirmOrder()">
                    ✅ 确认并生成发货单
                </button>
                <button class="btn btn-secondary" onclick="showAdjustForm()">
                    ✏️ 调整信息
                </button>
                <button class="btn btn-danger" onclick="cancelOrder()">
                    ❌ 取消
                </button>
            </div>
            
            <div id="adjustmentForm" class="adjustment-form" style="display: none;">
                <div class="adjustment-row">
                    <div class="input-group">
                        <label>购买单位</label>
                        <input type="text" id="adjustUnit" placeholder="购买单位名称">
                    </div>
                </div>
                <div class="adjustment-row">
                    <div class="input-group">
                        <label>产品名称</label>
                        <input type="text" id="adjustProduct" placeholder="产品名称">
                    </div>
                    <div class="input-group">
                        <label>产品型号</label>
                        <input type="text" id="adjustModel" placeholder="型号">
                    </div>
                </div>
                <div class="adjustment-row">
                    <div class="input-group">
                        <label>数量(kg)</label>
                        <input type="number" id="adjustKg" placeholder="公斤数">
                    </div>
                    <div class="input-group">
                        <label>桶规格(kg/桶)</label>
                        <input type="number" id="adjustTinSpec" placeholder="每桶公斤数">
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="applyAdjustment()">应用调整</button>
                    <button class="btn btn-secondary" onclick="hideAdjustForm()">取消</button>
                </div>
            </div>
        </div>
        
        <!-- 生成结果区域 -->
        <div class="card" id="generatedCard" style="display: none;">
            <div class="card-title">
                <span class="icon">📄</span>
                发货单已生成
            </div>
            
            <div id="generatedContent"></div>
            
            <div class="action-buttons">
                <a id="downloadBtn" class="btn btn-primary" href="" download>
                    📥 下载发货单
                </a>
                <button class="btn btn-secondary" onclick="startNewOrder()">
                    ➕ 新建发货单
                </button>
            </div>
        </div>
        
        <!-- 历史记录区域 -->
        <div class="card">
            <div class="card-title">
                <span class="icon">📋</span>
                待处理订单
            </div>
            <div id="historyList">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>暂无待处理订单</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentResult = null;
        let currentAdjustment = {};
        let selectedExcelFile = null;
        let excelSyncEnabled = false;
        
        function toggleExcelSync() {
            const checkbox = document.getElementById('enableExcelSync');
            const fileSection = document.getElementById('excelFileSection');
            const syncStatus = document.getElementById('syncStatus');
            
            if (checkbox.checked) {
                fileSection.style.display = 'block';
                syncStatus.style.display = 'inline-block';
                syncStatus.textContent = '待配置';
                syncStatus.className = 'status-badge status-pending';
            } else {
                fileSection.style.display = 'none';
                syncStatus.style.display = 'none';
                excelSyncEnabled = false;
                selectedExcelFile = null;
                document.getElementById('selectedFileInfo').textContent = '';
                
                // 禁用后端同步
                fetch('/api/excel/sync/disable', { method: 'POST' });
            }
        }
        
        async function handleExcelFileSelect() {
            const fileInput = document.getElementById('excelFileInput');
            const file = fileInput.files[0];
            const fileInfo = document.getElementById('selectedFileInfo');
            const syncStatus = document.getElementById('syncStatus');
            
            if (!file) {
                selectedExcelFile = null;
                fileInfo.textContent = '';
                return;
            }
            
            // 检查文件类型
            if (!file.name.endsWith('.xlsx')) {
                alert('请选择.xlsx格式的Excel文件');
                fileInput.value = '';
                return;
            }
            
            // 先显示文件名
            fileInfo.textContent = `⏳ 正在上传: ${file.name}`;
            fileInfo.style.color = '#f57c00';
            
            // 启用后端Excel同步
            try {
                const formData = new FormData();
                formData.append('excel_file', file);
                formData.append('worksheet_name', '25出货');
                
                const response = await fetch('/api/excel/sync/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                console.log('上传响应:', data);
                
                if (data.success) {
                    excelSyncEnabled = true;
                    selectedExcelFile = data.excel_path;
                    syncStatus.textContent = '已启用';
                    syncStatus.className = 'status-badge status-success';
                    fileInfo.textContent = `✅ ${data.filename}`;
                    fileInfo.style.color = '#2e7d32';
                } else {
                    // 上传失败
                    fileInfo.textContent = `❌ ${data.message || '上传失败'}`;
                    fileInfo.style.color = '#c62828';
                    fileInput.value = '';
                    selectedExcelFile = null;
                    setTimeout(() => {
                        fileInfo.textContent = '未选择文件';
                        fileInfo.style.color = '#666';
                    }, 3000);
                }
            } catch (error) {
                console.error('上传失败:', error);
                fileInfo.textContent = `❌ 网络错误: ${error.message}`;
                fileInfo.style.color = '#c62828';
            }
        }
        
        function useExample(element) {
            document.getElementById('orderText').value = element.textContent;
        }
        
        function clearInput() {
            document.getElementById('orderText').value = '';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('generatedCard').style.display = 'none';
            currentResult = null;
        }
        
        async function submitOrder() {
            const orderText = document.getElementById('orderText').value.trim();
            
            if (!orderText) {
                alert('请输入订单信息');
                return;
            }
            
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span> 解析中...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/shipment/workflow/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        order_text: orderText
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('resultCard').style.display = 'block';
                    document.getElementById('generatedCard').style.display = 'none';
                    
                    currentResult = data.parsed_data;
                    currentAdjustment = {...currentResult};
                    
                    // 显示解析结果
                    const parsed = data.parsed_data;
                    document.getElementById('resultContent').innerHTML = `
                        <div class="result-card">
                            <div class="result-item">
                                <span class="result-label">购买单位</span>
                                <span class="result-value">${parsed.purchase_unit || '未识别'}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">产品名称</span>
                                <span class="result-value">${parsed.product_name || '未识别'}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">产品型号</span>
                                <span class="result-value">${parsed.model_number || '未匹配'}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">数量</span>
                                <span class="result-value">${parsed.quantity_kg}kg = ${parsed.quantity_tins}桶（每桶${parsed.tin_spec}kg）</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">单价</span>
                                <span class="result-value">¥${parsed.unit_price || 0}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">金额</span>
                                <span class="result-value">¥${parsed.amount || 0}</span>
                            </div>
                        </div>
                    `;
                } else {
                    alert(data.message || '解析失败');
                }
            } catch (error) {
                console.error('解析失败:', error);
                alert('解析失败，请重试');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        
        function showAdjustForm() {
            document.getElementById('adjustmentForm').style.display = 'block';
            document.getElementById('actionButtons').style.display = 'none';
            
            // 填充当前值
            document.getElementById('adjustUnit').value = currentAdjustment.purchase_unit || '';
            document.getElementById('adjustProduct').value = currentAdjustment.product_name || '';
            document.getElementById('adjustModel').value = currentAdjustment.model_number || '';
            document.getElementById('adjustKg').value = currentAdjustment.quantity_kg || 0;
            document.getElementById('adjustTinSpec').value = currentAdjustment.tin_spec || 10;
        }
        
        function hideAdjustForm() {
            document.getElementById('adjustmentForm').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'flex';
        }
        
        function applyAdjustment() {
            currentAdjustment.purchase_unit = document.getElementById('adjustUnit').value;
            currentAdjustment.product_name = document.getElementById('adjustProduct').value;
            currentAdjustment.model_number = document.getElementById('adjustModel').value;
            currentAdjustment.quantity_kg = parseFloat(document.getElementById('adjustKg').value) || 0;
            currentAdjustment.tin_spec = parseFloat(document.getElementById('adjustTinSpec').value) || 10;
            
            // 重新计算桶数
            currentAdjustment.quantity_tins = Math.round(currentAdjustment.quantity_kg / currentAdjustment.tin_spec);
            
            // 更新显示
            document.getElementById('resultContent').innerHTML = `
                <div class="result-card">
                    <div class="result-item">
                        <span class="result-label">购买单位</span>
                        <span class="result-value">${currentAdjustment.purchase_unit || '未识别'}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">产品名称</span>
                        <span class="result-value">${currentAdjustment.product_name || '未识别'}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">产品型号</span>
                        <span class="result-value">${currentAdjustment.model_number || '未匹配'}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">数量</span>
                        <span class="result-value">${currentAdjustment.quantity_kg}kg = ${currentAdjustment.quantity_tins}桶（每桶${currentAdjustment.tin_spec}kg）</span>
                    </div>
                </div>
            `;
            
            hideAdjustForm();
        }
        
        async function confirmOrder() {
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span> 生成中...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/shipment/workflow/confirm', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        confirm: true,
                        adjustments: currentAdjustment
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('resultCard').style.display = 'none';
                    document.getElementById('generatedCard').style.display = 'block';
                    
                    const doc = data.document;
                    document.getElementById('generatedContent').innerHTML = `
                        <div class="result-card">
                            <div class="result-item">
                                <span class="result-label">订单编号</span>
                                <span class="result-value">${doc.order_number}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">购买单位</span>
                                <span class="result-value">${doc.purchase_unit?.name || '未知'}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">产品数量</span>
                                <span class="result-value">${doc.products?.length || 0} 种</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">总数量</span>
                                <span class="result-value">${doc.total_quantity}kg</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">总金额</span>
                                <span class="result-value">¥${doc.total_amount}</span>
                            </div>
                        </div>
                    `;
                    
                    // 设置下载链接
                    const downloadBtn = document.getElementById('downloadBtn');
                    downloadBtn.href = data.download_url;
                    downloadBtn.download = doc.filename;
                } else {
                    alert(data.message || '生成失败');
                }
            } catch (error) {
                console.error('生成失败:', error);
                alert('生成失败，请重试');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        
        async function cancelOrder() {
            try {
                await fetch('/api/shipment/workflow/cancel', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                });
                
                clearInput();
            } catch (error) {
                console.error('取消失败:', error);
            }
        }
        
        function startNewOrder() {
            clearInput();
            loadHistory();
        }
        
        async function loadHistory() {
            try {
                const response = await fetch('/api/shipment/records?status=pending');
                const data = await response.json();
                
                if (data.success && data.data.length > 0) {
                    const historyList = document.getElementById('historyList');
                    historyList.innerHTML = `
                        <div class="product-list">
                            ${data.data.map(record => `
                                <div class="product-item">
                                    <div class="number">${record.id}</div>
                                    <div class="info">
                                        <div class="name">${record.purchase_unit} - ${record.product_name}</div>
                                        <div class="detail">${record.quantity_kg}kg | ${record.model_number || '无型号'}</div>
                                    </div>
                                    <span class="status-badge status-pending">待处理</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }
        
        // 页面加载时获取历史记录
        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
