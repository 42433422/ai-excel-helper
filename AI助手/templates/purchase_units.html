<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购买单位管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        h2 {
            color: #34495e;
            margin: 25px 0 15px;
            font-size: 20px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 8px;
        }
        
        .card {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .form-col {
            flex: 1;
            min-width: 200px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.3s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        .btn:hover {
            background-color: #2980b9;
        }
        
        .btn-success {
            background-color: #2ecc71;
        }
        
        .btn-success:hover {
            background-color: #27ae60;
        }
        
        .btn-danger {
            background-color: #e74c3c;
        }
        
        .btn-danger:hover {
            background-color: #c0392b;
        }
        
        .btn-secondary {
            background-color: #95a5a6;
        }
        
        .btn-secondary:hover {
            background-color: #7f8c8d;
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            font-weight: 500;
            display: none;
        }
        
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #007bff;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #dc3545;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #495057;
        }
        
        tr:hover {
            background-color: #f5f7fa;
        }
        
        .action-btns {
            display: flex;
            gap: 5px;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #3498db;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .quick-add {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 购买单位管理</h1>
        
        <a href="/create" class="back-link">← 返回新建发货单</a>
        
        <div class="status" id="status"></div>
        
        <!-- 快速添加 -->
        <div class="card">
            <h2>➕ 添加购买单位</h2>
            <div class="quick-add">
                <div class="form-row">
                    <div class="form-col">
                        <label for="unitName">购买单位名称 *</label>
                        <input type="text" id="unitName" placeholder="请输入购买单位名称">
                    </div>
                    <div class="form-col">
                        <label for="contactPerson">联系人</label>
                        <input type="text" id="contactPerson" placeholder="联系人姓名">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label for="contactPhone">联系电话</label>
                        <input type="text" id="contactPhone" placeholder="联系电话">
                    </div>
                    <div class="form-col">
                        <label for="address">地址</label>
                        <input type="text" id="address" placeholder="地址">
                    </div>
                </div>
                <div class="form-row">
                    <button class="btn btn-success" onclick="addPurchaseUnit()" style="padding: 12px 30px;">💾 保存</button>
                    <button class="btn btn-secondary" onclick="clearForm()" style="padding: 12px 30px;">🔄 清空</button>
                </div>
            </div>
        </div>
        
        <!-- 单位列表 -->
        <div class="card">
            <h2>📋 购买单位列表</h2>
            <div id="unitsList">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <!-- 编辑模态框 -->
    <div id="editModal" class="product-selector-modal" style="display: none;">
        <div class="modal-content" style="width: 500px;">
            <div class="modal-header">
                <h3>编辑购买单位</h3>
                <button type="button" class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editUnitId">
                <div class="form-row">
                    <div class="form-col">
                        <label>购买单位名称 *</label>
                        <input type="text" id="editUnitName" placeholder="单位名称">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label>联系人</label>
                        <input type="text" id="editContactPerson" placeholder="联系人">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label>联系电话</label>
                        <input type="text" id="editContactPhone" placeholder="电话">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label>地址</label>
                        <input type="text" id="editAddress" placeholder="地址">
                    </div>
                </div>
                <div class="form-row" style="justify-content: flex-end; margin-top: 20px;">
                    <button class="btn" onclick="closeEditModal()" style="margin-right: 10px;">取消</button>
                    <button class="btn btn-success" onclick="saveEdit()">保存</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function showStatus(message, type) {
            const statusElement = document.getElementById('status');
            statusElement.textContent = message;
            statusElement.className = `status ${type}`;
            statusElement.style.display = 'block';
            
            setTimeout(() => {
                statusElement.style.display = 'none';
            }, 3000);
        }
        
        // 页面加载时获取所有单位
        document.addEventListener('DOMContentLoaded', function() {
            loadUnits();
        });
        
        // 加载单位列表
        function loadUnits() {
            const listContainer = document.getElementById('unitsList');
            listContainer.innerHTML = '<div class="loading">加载中...</div>';
            
            fetch('/api/purchase_units')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        displayUnits(data.data);
                    } else {
                        listContainer.innerHTML = `<div class="error">加载失败: ${data.message}</div>`;
                    }
                })
                .catch(error => {
                    console.error('加载失败:', error);
                    listContainer.innerHTML = '<div class="error">加载失败: 网络错误</div>';
                });
        }
        
        // 显示单位列表
        function displayUnits(units) {
            const listContainer = document.getElementById('unitsList');
            
            if (!units || units.length === 0) {
                listContainer.innerHTML = '<div class="no-data">暂无购买单位，请添加</div>';
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>购买单位</th>
                            <th>联系人</th>
                            <th>电话</th>
                            <th>地址</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            units.forEach(unit => {
                html += `
                    <tr>
                        <td>${unit.id}</td>
                        <td style="font-weight: 600;">${unit.unit_name || ''}</td>
                        <td>${unit.contact_person || '-'}</td>
                        <td>${unit.contact_phone || '-'}</td>
                        <td>${unit.address || '-'}</td>
                        <td class="action-btns">
                            <button class="btn" onclick="editUnit(${JSON.stringify(unit).replace(/"/g, '&quot;')})" style="padding: 5px 10px; font-size: 12px;">编辑</button>
                            <button class="btn btn-danger" onclick="deleteUnit(${unit.id})" style="padding: 5px 10px; font-size: 12px;">删除</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            listContainer.innerHTML = html;
        }
        
        // 添加单位
        function addPurchaseUnit() {
            const unitName = document.getElementById('unitName').value.trim();
            const contactPerson = document.getElementById('contactPerson').value.trim();
            const contactPhone = document.getElementById('contactPhone').value.trim();
            const address = document.getElementById('address').value.trim();
            
            if (!unitName) {
                alert('请输入购买单位名称');
                return;
            }
            
            const unit = {
                unit_name: unitName,
                contact_person: contactPerson,
                contact_phone: contactPhone,
                address: address
            };
            
            fetch('/api/purchase_units', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(unit)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showStatus(`✅ "${unitName}" 添加成功！`, 'success');
                    clearForm();
                    loadUnits();
                } else {
                    showStatus(`❌ 添加失败: ${data.message}`, 'error');
                }
            })
            .catch(error => {
                console.error('添加失败:', error);
                showStatus('❌ 添加失败: 网络错误', 'error');
            });
        }
        
        // 清空表单
        function clearForm() {
            document.getElementById('unitName').value = '';
            document.getElementById('contactPerson').value = '';
            document.getElementById('contactPhone').value = '';
            document.getElementById('address').value = '';
        }
        
        // 编辑单位
        function editUnit(unit) {
            document.getElementById('editUnitId').value = unit.id;
            document.getElementById('editUnitName').value = unit.unit_name || '';
            document.getElementById('editContactPerson').value = unit.contact_person || '';
            document.getElementById('editContactPhone').value = unit.contact_phone || '';
            document.getElementById('editAddress').value = unit.address || '';
            
            document.getElementById('editModal').style.display = 'flex';
        }
        
        // 关闭编辑模态框
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        // 保存编辑
        function saveEdit() {
            const unitId = document.getElementById('editUnitId').value;
            const unitName = document.getElementById('editUnitName').value.trim();
            const contactPerson = document.getElementById('editContactPerson').value.trim();
            const contactPhone = document.getElementById('editContactPhone').value.trim();
            const address = document.getElementById('editAddress').value.trim();
            
            if (!unitName) {
                alert('请输入购买单位名称');
                return;
            }
            
            const unit = {
                unit_name: unitName,
                contact_person: contactPerson,
                contact_phone: contactPhone,
                address: address
            };
            
            fetch(`/api/purchase_units/${unitId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(unit)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showStatus('✅ 更新成功！', 'success');
                    closeEditModal();
                    loadUnits();
                } else {
                    showStatus(`❌ 更新失败: ${data.message}`, 'error');
                }
            })
            .catch(error => {
                console.error('更新失败:', error);
                showStatus('❌ 更新失败: 网络错误', 'error');
            });
        }
        
        // 删除单位
        function deleteUnit(unitId) {
            if (!confirm('确定要删除这个购买单位吗？')) {
                return;
            }
            
            fetch(`/api/purchase_units/${unitId}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showStatus('✅ 删除成功！', 'success');
                    loadUnits();
                } else {
                    showStatus(`❌ 删除失败: ${data.message}`, 'error');
                }
            })
            .catch(error => {
                console.error('删除失败:', error);
                showStatus('❌ 删除失败: 网络错误', 'error');
            });
        }
        
        // 点击模态框外部关闭
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });
    </script>
</body>
</html>
