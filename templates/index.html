<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XLSX文件处理工具</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        /* 容器样式 */
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        /* 标题样式 */
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        /* 副标题样式 */
        h2 {
            color: #34495e;
            margin: 25px 0 15px;
            font-size: 20px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 8px;
        }
        
        /* 说明文本样式 */
        .description {
            background-color: #e8f4f8;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            border-left: 4px solid #3498db;
        }
        
        .description ul {
            margin-left: 20px;
            margin-top: 10px;
        }
        
        .description li {
            margin-bottom: 5px;
        }
        
        /* 表单样式 */
        .upload-form {
            text-align: center;
            padding: 30px;
            border: 2px dashed #bdc3c7;
            border-radius: 10px;
            background-color: #fafafa;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        
        .upload-form:hover {
            border-color: #3498db;
            background-color: #f0f8ff;
        }
        
        .file-input {
            display: none;
        }
        
        .file-label {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s ease;
            margin-bottom: 15px;
        }
        
        .file-label:hover {
            background-color: #2980b9;
        }
        
        .file-info {
            margin-top: 15px;
            font-size: 14px;
            color: #7f8c8d;
        }
        
        /* 按钮样式 */
        .btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.3s ease;
            margin-top: 15px;
        }
        
        .btn:hover {
            background-color: #27ae60;
        }
        
        .btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        
        /* 状态信息样式 */
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            font-weight: 500;
            display: none;
        }
        
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.processing {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        /* 结果区域样式 */
        .result {
            margin-top: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 5px;
            display: none;
        }
        
        .download-link {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            margin-top: 15px;
            transition: background-color 0.3s ease;
        }
        
        .download-link:hover {
            background-color: #2980b9;
        }
        
        /* 加载动画样式 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 页脚样式 */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>XLSX文件处理工具</h1>
        
        <div class="description">
            <p>本工具可以帮助您处理XLSX文件，主要功能包括：</p>
            <ul>
                <li>上传XLSX格式文件</li>
                <li>自动识别并处理文件中的合并单元格</li>
                <li>将处理后的内容重新生成XLSX文件</li>
                <li>提供处理后文件的下载功能</li>
            </ul>
        </div>
        
        <h2>上传文件</h2>
        
        <form id="uploadForm" class="upload-form">
            <input type="file" id="fileInput" class="file-input" accept=".xlsx">
            <label for="fileInput" class="file-label">
                <i class="fa fa-cloud-upload"></i> 选择XLSX文件
            </label>
            <div class="file-info" id="fileInfo">未选择文件</div>
            <div class="status" id="status"></div>
            <button type="submit" class="btn" id="submitBtn">
                <span id="btnText">开始处理</span>
                <span class="loading" id="loading"></span>
            </button>
        </form>
        
        <div class="result" id="result">
            <h2>处理结果</h2>
            <div id="resultContent"></div>
        </div>
        
        <div class="footer">
            <p>XLSX文件处理工具 &copy; 2026</p>
        </div>
    </div>
    
    <script>
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            const fileInput = document.getElementById('fileInput');
            const fileInfo = document.getElementById('fileInfo');
            const uploadForm = document.getElementById('uploadForm');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loading = document.getElementById('loading');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');
            
            // 监听文件选择事件
            fileInput.addEventListener('change', function() {
                if (this.files.length > 0) {
                    const file = this.files[0];
                    fileInfo.textContent = `已选择文件: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
                } else {
                    fileInfo.textContent = '未选择文件';
                }
            });
            
            // 监听表单提交事件
            uploadForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const file = fileInput.files[0];
                if (!file) {
                    showStatus('请选择要上传的文件', 'error');
                    return;
                }
                
                // 检查文件类型
                if (file.type !== 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' && 
                    file.name.split('.').pop().toLowerCase() !== 'xlsx') {
                    showStatus('只支持XLSX格式文件', 'error');
                    return;
                }
                
                // 开始处理
                processFile(file);
            });
            
            // 处理文件
            function processFile(file) {
                // 显示处理状态
                showStatus('正在处理文件...', 'processing');
                showLoading(true);
                result.style.display = 'none';
                
                // 创建FormData对象
                const formData = new FormData();
                formData.append('file', file);
                
                // 发送AJAX请求
                fetch('/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    showLoading(false);
                    
                    if (data.success) {
                        showStatus('文件处理成功！', 'success');
                        showResult(data.output_filename);
                    } else {
                        showStatus(data.message, 'error');
                    }
                })
                .catch(error => {
                    showLoading(false);
                    showStatus('处理过程中发生错误：' + error.message, 'error');
                });
            }
            
            // 显示状态信息
            function showStatus(message, type) {
                status.textContent = message;
                status.className = `status ${type}`;
                status.style.display = 'block';
            }
            
            // 显示/隐藏加载动画
            function showLoading(show) {
                if (show) {
                    loading.style.display = 'inline-block';
                    btnText.textContent = '处理中...';
                    submitBtn.disabled = true;
                } else {
                    loading.style.display = 'none';
                    btnText.textContent = '开始处理';
                    submitBtn.disabled = false;
                }
            }
            
            // 显示处理结果
            function showResult(outputFilename) {
                const downloadUrl = `/download/${outputFilename}`;
                resultContent.innerHTML = `
                    <p>文件已成功处理完成！</p>
                    <a href="${downloadUrl}" class="download-link" download>
                        <i class="fa fa-download"></i> 下载处理后的文件
                    </a>
                `;
                result.style.display = 'block';
            }
        });
    </script>
</body>
</html>
