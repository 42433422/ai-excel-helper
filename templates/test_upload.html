<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传测试页面</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px;
            background-color: #f5f7fa;
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
        }
        input[type="text"], input[type="file"] { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input[type="text"]:focus, input[type="file"]:focus {
            border-color: #3498db;
            outline: none;
        }
        button { 
            background: #2ecc71; 
            color: white; 
            padding: 15px 30px; 
            border: none; 
            cursor: pointer; 
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.3s;
        }
        button:hover { 
            background: #27ae60; 
        }
        button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        .result { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: bold;
        }
        .success { 
            background: #d4edda; 
            color: #155724; 
            border: 1px solid #c3e6cb;
        }
        .error { 
            background: #f8d7da; 
            color: #721c24; 
            border: 1px solid #f5c6cb;
        }
        .info { 
            background: #d1ecf1; 
            color: #0c5460; 
            border: 1px solid #bee5eb;
        }
        #log {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            margin-top: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            border-radius: 8px;
            font-size: 14px;
        }
        .timestamp {
            color: #3498db;
        }
        .success-log {
            color: #2ecc71;
        }
        .error-log {
            color: #e74c3c;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 文件上传功能测试</h1>
        
        <form id="uploadForm">
            <div class="form-group">
                <label for="templateName">模板名称:</label>
                <input type="text" id="templateName" value="测试模板" placeholder="请输入模板名称">
            </div>
            
            <div class="form-group">
                <label for="fileInput">选择Excel文件:</label>
                <input type="file" id="fileInput" accept=".xlsx">
            </div>
            
            <button type="button" onclick="testUpload()" id="uploadBtn">
                🚀 开始测试上传
            </button>
        </form>
        
        <div id="result"></div>
        <div id="log"></div>
    </div>

    <script>
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logElement = document.getElementById('log');
            const className = type === 'error' ? 'error-log' : type === 'success' ? 'success-log' : '';
            
            const logMessage = `[${timestamp}] ${message}`;
            logElement.innerHTML += `<span class="${className}">${logMessage}</span>\n`;
            
            // 自动滚动到底部
            logElement.scrollTop = logElement.scrollHeight;
            
            // 同时输出到控制台
            console.log(`[${timestamp}] ${message}`);
        }

        function showResult(message, type = 'info') {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = message;
            resultDiv.className = `result ${type}`;
        }

        function setLoading(loading) {
            const btn = document.getElementById('uploadBtn');
            if (loading) {
                btn.innerHTML = '🔄 正在上传中... <span class="loading"></span>';
                btn.disabled = true;
            } else {
                btn.innerHTML = '🚀 开始测试上传';
                btn.disabled = false;
            }
        }

        function testUpload() {
            log('=== 开始文件上传测试 ===');
            
            const fileInput = document.getElementById('fileInput');
            const templateName = document.getElementById('templateName').value.trim();
            
            log('输入检查:');
            log(`  模板名称: "${templateName}"`);
            log(`  文件数量: ${fileInput.files.length}`);
            
            // 检查输入
            if (!fileInput.files.length) {
                log('❌ 错误: 没有选择文件', 'error');
                showResult('请选择.xlsx格式的Excel文件', 'error');
                return;
            }
            
            if (!templateName) {
                log('❌ 错误: 没有输入模板名称', 'error');
                showResult('请输入模板名称', 'error');
                return;
            }
            
            const selectedFile = fileInput.files[0];
            log(`✅ 文件验证通过: ${selectedFile.name} (${(selectedFile.size / 1024).toFixed(1)} KB)`);
            
            setLoading(true);
            showResult('正在上传文件...', 'info');
            log('正在发送请求到服务器...');
            
            // 创建表单数据
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('template_name', templateName);
            
            log('FormData准备完成，开始发送请求...');
            
            // 发送请求
            fetch('/templates', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                log(`收到响应: HTTP ${response.status} ${response.statusText}`);
                
                if (!response.ok) {
                    throw new Error(`服务器错误: ${response.status} ${response.statusText}`);
                }
                
                return response.json();
            })
            .then(data => {
                log('服务器响应数据: ' + JSON.stringify(data, null, 2));
                
                setLoading(false);
                
                if (data.success) {
                    log('🎉 上传成功!', 'success');
                    showResult(`✅ 上传成功!<br>模板名称: ${data.template_name}<br>保存路径: ${data.template_path}`, 'success');
                    
                    // 清空表单
                    fileInput.value = '';
                    document.getElementById('templateName').value = '测试模板';
                } else {
                    log(`❌ 上传失败: ${data.message}`, 'error');
                    showResult(`❌ 上传失败: ${data.message}`, 'error');
                }
            })
            .catch(error => {
                log('❌ 网络错误: ' + error.message, 'error');
                showResult('❌ 网络错误: ' + error.message, 'error');
                setLoading(false);
            });
        }

        // 页面加载完成后显示测试信息
        document.addEventListener('DOMContentLoaded', function() {
            log('页面加载完成，测试环境已就绪');
            log('📋 测试步骤:');
            log('  1. 输入模板名称');
            log('  2. 选择.xlsx文件');
            log('  3. 点击"开始测试上传"');
            log('  4. 观察日志输出和结果');
            showResult('请选择文件并点击测试上传', 'info');
        });

        // 文件选择监听
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                log(`📁 用户选择了文件: ${file.name}`);
                showResult(`已选择文件: ${file.name}`, 'info');
            } else {
                log('📁 用户取消了文件选择');
                showResult('请选择.xlsx格式的Excel文件', 'info');
            }
        });
    </script>
</body>
</html>
