<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 微信AI自动回复控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            opacity: 0.8;
        }
        
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .status-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .status-item .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .status-item .label {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 5px;
        }
        
        .status-item .value {
            font-size: 18px;
            font-weight: 600;
        }
        
        .status-item .value.active {
            color: #00ff88;
        }
        
        .status-item .value.inactive {
            color: #ff6b6b;
        }
        
        .control-section {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .control-btn {
            flex: 1;
            padding: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .control-btn.start {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
        }
        
        .control-btn.stop {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }
        
        .control-btn.test {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #1a1a2e;
        }
        
        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .settings {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        .setting-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
        }
        
        .setting-item label {
            display: block;
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        
        .setting-item input, .setting-item select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
        }
        
        .test-section {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .test-section h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }
        
        .test-input {
            width: 100%;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 15px;
            margin-bottom: 16px;
            resize: vertical;
            min-height: 80px;
        }
        
        .test-result {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            min-height: 100px;
        }
        
        .test-result .label {
            font-size: 12px;
            opacity: 0.6;
            margin-bottom: 8px;
        }
        
        .test-result .content {
            font-size: 15px;
            line-height: 1.6;
        }
        
        .log-section {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-family: monospace;
            font-size: 13px;
        }
        
        .log-item:last-child {
            border-bottom: none;
        }
        
        .log-time {
            opacity: 0.6;
            margin-right: 10px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .feature-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        
        .feature-item {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            font-size: 13px;
        }
        
        .feature-item .icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 微信AI自动回复系统</h1>
            <p>智能监控微信聊天 · AI自动生成回复 · 自动发送消息</p>
        </div>
        
        <div class="card">
            <h2 style="margin-bottom: 20px;">📊 系统状态</h2>
            
            <div class="status-grid">
                <div class="status-item">
                    <div class="icon">🛰️</div>
                    <div class="label">监控服务</div>
                    <div class="value" id="monitorStatus">--</div>
                </div>
                <div class="status-item">
                    <div class="icon">🤖</div>
                    <div class="label">AI引擎</div>
                    <div class="value" id="aiStatus">--</div>
                </div>
                <div class="status-item">
                    <div class="icon">💬</div>
                    <div class="label">自动回复</div>
                    <div class="value" id="autoReplyStatus">--</div>
                </div>
                <div class="status-item">
                    <div class="icon">📨</div>
                    <div class="label">今日处理</div>
                    <div class="value" id="todayCount">--</div>
                </div>
            </div>
            
            <div class="feature-list">
                <div class="feature-item">
                    <div class="icon">👁️</div>
                    <div>聊天监控</div>
                </div>
                <div class="feature-item">
                    <div class="icon">🧠</div>
                    <div>AI理解</div>
                </div>
                <div class="feature-item">
                    <div class="icon">💭</div>
                    <div>智能回复</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2 style="margin-bottom: 20px;">🎮 控制台</h2>
            
            <div class="control-section">
                <button class="control-btn start" id="startBtn" onclick="startMonitor()">
                    🚀 启动监控
                </button>
                <button class="control-btn stop" id="stopBtn" onclick="stopMonitor()" disabled>
                    ⏹️ 停止监控
                </button>
                <button class="control-btn test" onclick="testReply()">
                    🧪 测试回复
                </button>
            </div>
            
            <div class="settings">
                <div class="setting-item">
                    <label>监控间隔（秒）</label>
                    <input type="number" id="interval" value="3" min="1" max="10">
                </div>
                <div class="setting-item">
                    <label>回复模式</label>
                    <select id="replyMode">
                        <option value="auto">自动回复</option>
                        <option value="manual">仅识别，不回复</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2 style="margin-bottom: 20px;">🧪 AI回复测试</h2>
            
            <textarea class="test-input" id="testInput" placeholder="输入测试消息，例如：侯雪梅要5桶PE白底漆"></textarea>
            
            <div style="margin: 15px 0;">
                <label style="display: inline-flex; align-items: center; margin-right: 20px; cursor: pointer;">
                    <input type="radio" name="testMode" value="normal" checked style="margin-right: 8px;">
                    正常测试
                </label>
                <label style="display: inline-flex; align-items: center; cursor: pointer;">
                    <input type="radio" name="testMode" value="collect_error" style="margin-right: 8px;">
                    加入错误数据库
                </label>
            </div>
            
            <button class="control-btn test" onclick="testReply()" style="width: 100%;">
                执行测试
            </button>
            
            <div class="test-section">
                <div class="label">AI回复结果：</div>
                <div class="test-result">
                    <div class="content" id="testResult">等待测试...</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2 style="margin-bottom: 20px;">📋 活动日志</h2>
            
            <div class="log-section" id="logSection">
                <div class="log-item">
                    <span class="log-time">--:--:--</span>
                    系统就绪，等待启动...
                </div>
            </div>
        </div>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>处理中...</div>
    </div>
    
    <script>
        const API_BASE = '/api/wechat/auto_reply';
        let isRunning = false;
        let messageCount = 0;
        
        // 初始化
        async function init() {
            await checkStatus();
            setInterval(checkStatus, 3000);
        }
        
        // 检查状态
        async function checkStatus() {
            try {
                const response = await fetch(API_BASE + '/status');
                const data = await response.json();
                
                if (data.success) {
                    const status = data.data;
                    isRunning = status.is_running;
                    
                    // 更新状态显示
                    document.getElementById('monitorStatus').textContent = isRunning ? '运行中' : '已停止';
                    document.getElementById('monitorStatus').className = 'value ' + (isRunning ? 'active' : 'inactive');
                    
                    document.getElementById('aiStatus').textContent = status.components.ai_engine ? '正常' : '异常';
                    document.getElementById('aiStatus').className = 'value ' + (status.components.ai_engine ? 'active' : 'inactive');
                    
                    document.getElementById('autoReplyStatus').textContent = isRunning ? '开启' : '关闭';
                    document.getElementById('autoReplyStatus').className = 'value ' + (isRunning ? 'active' : 'inactive');
                    
                    document.getElementById('todayCount').textContent = messageCount;
                    
                    // 更新按钮状态
                    document.getElementById('startBtn').disabled = isRunning;
                    document.getElementById('stopBtn').disabled = !isRunning;
                }
            } catch (error) {
                console.error('检查状态失败:', error);
            }
        }
        
        // 启动监控
        async function startMonitor() {
            const interval = document.getElementById('interval').value;
            
            showLoading(true);
            try {
                const response = await fetch(API_BASE + '/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({interval: parseInt(interval)})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addLog('🚀 微信AI监控已启动');
                    isRunning = true;
                } else {
                    alert('启动失败: ' + data.message);
                }
            } catch (error) {
                alert('启动失败: ' + error);
            }
            showLoading(false);
        }
        
        // 停止监控
        async function stopMonitor() {
            showLoading(true);
            try {
                const response = await fetch(API_BASE + '/stop', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addLog('⏹️ 微信AI监控已停止');
                    isRunning = false;
                } else {
                    alert('停止失败: ' + data.message);
                }
            } catch (error) {
                alert('停止失败: ' + error);
            }
            showLoading(false);
        }
        
        // 测试回复
        async function testReply() {
            const message = document.getElementById('testInput').value.trim();
            if (!message) {
                alert('请输入测试消息');
                return;
            }
            
            // 获取测试模式
            const testMode = document.querySelector('input[name="testMode"]:checked').value;
            
            showLoading(true);
            try {
                let apiEndpoint = API_BASE + '/test';
                let requestBody = {message: message};
                
                // 如果是错误收集模式，发送到专门的端点
                if (testMode === 'collect_error') {
                    apiEndpoint = '/api/error/collect';
                    requestBody = {
                        user_message: message,
                        error_type: 'manual_collection',
                        error_details: '前端手动收集的错误',
                        priority: 'medium'
                    };
                }
                
                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    let resultHtml = `<strong>输入:</strong> ${message}<br><br>`;
                    
                    if (testMode === 'collect_error') {
                        resultHtml += `<strong>错误收集:</strong> ✅ 已加入错误数据库<br>`;
                        if (data.data && data.data.error_id) {
                            resultHtml += `<strong>记录ID:</strong> ${data.data.error_id}`;
                        }
                    } else {
                        resultHtml += `<strong>AI回复:</strong> ${data.data.reply}`;
                    }
                    
                    document.getElementById('testResult').innerHTML = resultHtml;
                    addLog(`🧪 ${testMode === 'collect_error' ? '错误收集' : '测试'}: ` + message.substring(0, 30) + '...');
                } else {
                    document.getElementById('testResult').textContent = '测试失败: ' + data.message;
                }
            } catch (error) {
                document.getElementById('testResult').textContent = '测试失败: ' + error;
            }
            showLoading(false);
        }
        
        // 添加日志
        function addLog(message) {
            const section = document.getElementById('logSection');
            const time = new Date().toLocaleTimeString();
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.innerHTML = `<span class="log-time">${time}</span>${message}`;
            section.insertBefore(logItem, section.firstChild);
            
            // 保留最近20条日志
            while (section.children.length > 20) {
                section.removeChild(section.lastChild);
            }
        }
        
        // 显示加载
        function showLoading(show) {
            document.getElementById('loading').className = 'loading ' + (show ? 'active' : '');
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
