<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XLSX模板编辑工具</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        /* 容器样式 */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        /* 标题样式 */
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        /* 副标题样式 */
        h2 {
            color: #34495e;
            margin: 25px 0 15px;
            font-size: 20px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 8px;
        }
        
        /* 说明文本样式 */
        .description {
            background-color: #e8f4f8;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            border-left: 4px solid #3498db;
        }
        
        /* 按钮样式 */
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.3s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        .btn:hover {
            background-color: #2980b9;
        }
        
        .btn-danger {
            background-color: #e74c3c;
        }
        
        .btn-danger:hover {
            background-color: #c0392b;
        }
        
        .btn-success {
            background-color: #2ecc71;
        }
        
        .btn-success:hover {
            background-color: #27ae60;
        }
        
        .btn-disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        
        /* 状态信息样式 */
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            font-weight: 500;
            display: none;
        }
        
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.processing {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .form-col {
            flex: 1;
            min-width: 200px;
        }
        
        .header-preview {
            width: 100%;
            margin: 15px 0;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        
        .header-preview-label {
            color: white;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .header-preview-content {
            display: flex;
            justify-content: space-between;
            background: white;
            color: #333;
            padding: 12px 15px;
            border-radius: 4px;
            font-size: 14px;
            font-family: monospace;
            border: 2px dashed #667eea;
            box-sizing: border-box;
        }
        
        .header-preview-item {
            flex: 1;
            text-align: center;
            padding: 0 10px;
            border-right: 1px dashed #ddd;
        }
        
        .header-preview-item:last-child {
            border-right: none;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        
        /* 表格样式 */
        .table-container {
            overflow-x: auto;
            margin: 20px 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #495057;
        }
        
        tr:hover {
            background-color: #f5f7fa;
        }
        
        /* 产品表格样式 */
        .product-table {
            margin: 20px 0;
        }
        
        .product-row {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            margin-bottom: 10px;
            background-color: #f9f9f9;
        }
        
        .product-cell {
            display: flex;
            flex-direction: column;
        }
        
        .product-cell label {
            font-size: 12px;
            color: #666;
            margin-bottom: 3px;
        }
        
        .product-cell input {
            padding: 5px 8px;
            font-size: 13px;
        }
        
        /* 卡片样式 */
        .card {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        /* 模板列表样式 */
        .template-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .template-item {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            background-color: #f9f9f9;
            transition: all 0.3s ease;
        }
        
        .template-item:hover {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }
        
        .template-name {
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .template-actions {
            margin-top: 15px;
        }
        
        /* 上传区域样式 */
        .upload-area {
            border: 2px dashed #bdc3c7;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            background-color: #fafafa;
            margin: 20px 0;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            border-color: #3498db;
            background-color: #f0f8ff;
        }
        
        /* 加载动画样式 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
            }
            
            .product-row {
                grid-template-columns: 1fr 1fr;
            }
            
            .template-list {
                grid-template-columns: 1fr;
            }
        }
        
        /* ==================== 产品库功能样式 ==================== */
        
        /* 产品导入区域 */
        .product-import-section {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-import-products {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.3s;
        }
        
        .btn-import-products:hover {
            background-color: #218838;
        }
        
        .import-tip {
            color: #6c757d;
            font-size: 13px;
        }
        
        /* 产品输入组样式 */
        .product-input-group {
            display: flex;
            gap: 5px;
        }
        
        .product-input-group input {
            flex: 1;
        }
        
        .btn-search-product {
            background-color: #17a2b8;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }
        
        .btn-search-product:hover {
            background-color: #138496;
        }
        
        /* 产品选择器模态框 */
        .product-selector-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 10px;
            width: 80%;
            max-width: 800px;
            max-height: 80%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            margin: 0;
            color: #333;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-btn:hover {
            color: #333;
        }
        
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        
        .search-section {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .search-section input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
        }
        
        .btn-search {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-search:hover {
            background-color: #0056b3;
        }
        
        .btn-add-new {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-add-new:hover {
            background-color: #218838;
        }
        
        .products-list {
            border: 1px solid #dee2e6;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .product-item {
            padding: 15px;
            border-bottom: 1px solid #f8f9fa;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .product-item:hover {
            background-color: #f8f9fa;
        }
        
        .product-item:last-child {
            border-bottom: none;
        }
        
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .product-model {
            font-weight: 600;
            color: #007bff;
        }
        
        .product-name {
            color: #333;
            font-size: 16px;
        }
        
        .product-specs {
            color: #6c757d;
            font-size: 13px;
        }
        
        .no-products {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #007bff;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #dc3545;
        }
        
        /* ==================== 产品库功能样式结束 ==================== */
        
    </style>
</head>
<body>
    <div class="container">
        <h1>XLSX模板编辑工具</h1>
        
        <div class="description">
            <p>本工具可以帮助您管理和编辑XLSX模板，实现"文档外操作，文档内变化"的效果。</p>
            <p>主要功能包括：</p>
            <ul>
                <li>上传和管理模板</li>
                <li>编辑模板中的数据</li>
                <li>实时保存修改</li>
                <li>生成更新后的文档</li>
            </ul>
        </div>
        
        <!-- 状态信息 -->
        <div class="status" id="status"></div>
        
        <!-- 模板管理区域 -->
        <div class="card">
            <h2>模板管理</h2>
            
            <!-- 上传模板 - 优化版本 -->
            <div class="upload-area">
                <h3>上传新模板</h3>
                <div style="margin: 15px 0;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">模板名称:</label>
                    <input type="text" id="templateName" placeholder="请输入模板名称" 
                           style="width: 300px; padding: 10px; border: 2px solid #ddd; border-radius: 5px; font-size: 14px;">
                </div>
                
                <div style="margin: 15px 0;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">选择文件:</label>
                    <input type="file" id="templateFile" accept=".xlsx" 
                           style="width: 300px; padding: 10px; border: 2px solid #ddd; border-radius: 5px; font-size: 14px;">
                </div>
                
                <button class="btn btn-success" onclick="uploadTemplate()" 
                        style="padding: 12px 30px; font-size: 16px; margin: 20px 0;">
                    📁 上传模板
                </button>
                
                <div id="fileInfo" style="margin-top: 15px; padding: 10px; border-radius: 5px; 
                      background-color: #f8f9fa; border: 1px solid #dee2e6; font-size: 14px; 
                      color: #6c757d; text-align: center;">
                    📄 未选择文件
                </div>
            </div>
            
            <!-- 模板列表 -->
            <h3>模板列表</h3>
            <div class="template-list" id="templateList"></div>
        </div>
        
        <!-- 模板编辑区域 -->
        <div class="card" id="editSection" style="display: none;">
            <h2>模板编辑</h2>
            <div id="templateInfo" style="margin-bottom: 20px;"></div>
            
            <!-- 第二行数据编辑 -->
            <h3>第二行数据（购买单位、联系人、日期、订单编号）</h3>
            <div class="form-row" id="headerRowEdit"></div>
            
            <!-- 第二行数据预览 -->
            <div class="header-preview">
                <div class="header-preview-label">📋 合并后预览：</div>
                <div class="header-preview-content">
                    <div class="header-preview-item" id="preview-purchase_unit">购货单位：xxx</div>
                    <div class="header-preview-item" id="preview-contact_person">联系人：xxx</div>
                    <div class="header-preview-item" id="preview-purchase_date">购买日期：2026-01-01</div>
                    <div class="header-preview-item" id="preview-order_number">订单编号：xxx</div>
                </div>
            </div>
            
            <!-- 产品数据编辑 -->
            <h3>产品数据</h3>
            <div id="productRowsEdit"></div>
            
            <!-- 第十六行数据编辑 -->
            <h3>第十六行数据（价格相关）</h3>
            <div class="form-row" id="priceRowEdit"></div>
            
            <!-- 保存按钮 -->
            <div style="margin-top: 20px;">
                <button class="btn btn-success" onclick="saveDocument();">保存并生成文档</button>
                <button class="btn" onclick="loadTemplates();">返回模板列表</button>
            </div>
        </div>
        
        <!-- 文档生成结果 -->
        <div class="card" id="resultSection" style="display: none;">
            <h2>文档生成结果</h2>
            <div id="resultContent"></div>
        </div>
    </div>
    
    <script>
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM加载完成，开始初始化...');
            
            // 加载模板列表
            loadTemplates();
            
            // 监听文件选择事件 - 修复版本
            const fileInput = document.getElementById('templateFile');
            const fileInfo = document.getElementById('fileInfo');
            
            console.log('文件输入元素检查:', {
                fileInput: !!fileInput,
                fileInfo: !!fileInfo
            });
            
            if (fileInput && fileInfo) {
                fileInput.addEventListener('change', function(e) {
                    console.log('文件选择事件触发');
                    console.log('事件对象:', e);
                    console.log('目标元素:', e.target);
                    
                    const file = e.target.files && e.target.files[0];
                    console.log('选择的文件:', file);
                    
                    if (file) {
                        fileInfo.textContent = `已选择文件: ${file.name}`;
                        fileInfo.style.color = '#28a745';
                        console.log('✅ 文件选择成功:', file.name);
                    } else {
                        fileInfo.textContent = '未选择文件';
                        fileInfo.style.color = '#666';
                        console.log('❌ 没有选择文件');
                    }
                });
                
                console.log('✅ 文件选择事件监听器绑定成功');
            } else {
                console.error('❌ 文件输入元素未找到');
            }
        });
        
        // 显示状态信息
        function showStatus(message, type) {
            const statusElement = document.getElementById('status');
            statusElement.textContent = message;
            statusElement.className = `status ${type}`;
            statusElement.style.display = 'block';
        }
        
        // 隐藏状态信息
        function hideStatus() {
            document.getElementById('status').style.display = 'none';
        }
        
        // 加载模板列表
        function loadTemplates() {
            showStatus('正在加载模板列表...', 'processing');
            
            fetch('/templates?action=api', {
                headers: {
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
                .then(response => response.json())
                .then(data => {
                    hideStatus();
                    if (data.success) {
                        renderTemplateList(data.templates);
                        // 显示模板管理区域，隐藏编辑和结果区域
                        document.getElementById('editSection').style.display = 'none';
                        document.getElementById('resultSection').style.display = 'none';
                    } else {
                        showStatus(data.message, 'error');
                    }
                })
                .catch(error => {
                    hideStatus();
                    showStatus('加载模板列表失败: ' + error.message, 'error');
                });
        }
        
        // 渲染模板列表
        function renderTemplateList(templates) {
            const templateList = document.getElementById('templateList');
            
            if (templates.length === 0) {
                templateList.innerHTML = '<p>暂无模板，请先上传模板</p>';
                return;
            }
            
            let html = '';
            for (const template of templates) {
                html += `
                    <div class="template-item">
                        <div class="template-name">${template.name}</div>
                        <div class="template-filename">${template.filename}</div>
                        <div class="template-actions">
                            <button class="btn" onclick="editTemplate('${template.name}')">编辑</button>
                            <button class="btn btn-danger" onclick="deleteTemplate('${template.name}')">删除</button>
                        </div>
                    </div>
                `;
            }
            
            templateList.innerHTML = html;
        }
        
        // 最简单的测试函数
        function testUploadFunction() {
            alert('🎯 测试函数执行成功！');
            console.log('✅ testUploadFunction 被调用');
        }
        
        // 上传模板
        // 上传模板
        function uploadTemplate() {
            console.log('🚀 uploadTemplate 函数被调用了！');
            
            const fileInput = document.getElementById('templateFile');
            const templateNameInput = document.getElementById('templateName');
            
            console.log('DOM元素检查:', {
                fileInput: !!fileInput,
                templateNameInput: !!templateNameInput
            });
            
            if (!fileInput || !templateNameInput) {
                alert('❌ 找不到必要的DOM元素，请刷新页面重试');
                console.error('DOM元素缺失:', {
                    fileInput: !!fileInput,
                    templateNameInput: !!templateNameInput
                });
                return;
            }
            
            const templateName = templateNameInput.value.trim();
            const files = fileInput.files;
            
            console.log('输入验证:', {
                templateName: templateName,
                fileCount: files ? files.length : 0,
                fileInputValue: fileInput.value
            });
            
            if (!files || files.length === 0) {
                alert('❌ 请先选择文件');
                return;
            }
            
            if (!templateName) {
                alert('❌ 请输入模板名称');
                return;
            }
            
            const selectedFile = files[0];
            console.log('✅ 开始上传:', {
                fileName: selectedFile.name,
                fileSize: selectedFile.size,
                fileType: selectedFile.type
            });
            
            // 显示加载状态
            const uploadBtn = document.querySelector('button[onclick="uploadTemplate()"]');
            const originalText = uploadBtn.innerHTML;
            uploadBtn.innerHTML = '⏳ 上传中...';
            uploadBtn.disabled = true;
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('template_name', templateName);
            
            console.log('📡 发送请求到 /templates');
            
            fetch('/templates', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                console.log('📨 收到响应:', {
                    status: response.status,
                    statusText: response.statusText,
                    headers: Object.fromEntries(response.headers.entries())
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
                }
                
                return response.json();
            })
            .then(data => {
                console.log('📋 响应数据:', data);
                
                // 恢复按钮状态
                uploadBtn.innerHTML = originalText;
                uploadBtn.disabled = false;

        // 获取表单数据
        function getFormData() {
            // 获取字段映射信息
            const fieldMapping = window.currentFieldMapping || {};
            
            // 构造要保存的数据
            const editableData = {
                header_row: {},
                price_row: {},
                product_rows: []
            };
            
            // 获取第二行数据
            const buyer = document.getElementById('buyer').value;
            const contact = document.getElementById('contact').value;
            const date = document.getElementById('date').value;
            const orderId = document.getElementById('orderId').value;
            
            // 构建第二行数据 - 使用字典格式（后端期望的格式）
            // 格式: {列号: {purchase_unit: "值", contact_person: "值", ...}}
            const headerData = {};
            
            // 检查是否有字段映射
            const hasMapping = Object.keys(fieldMapping).length > 0;
            
            if (hasMapping) {
                // 如果有字段映射，所有字段都在同一个合并单元格里
                // 找到任意一个字段对应的列（通常都是同一个合并单元格）
                const firstCol = Object.values(fieldMapping)[0];
                
                headerData[firstCol] = {
                    purchase_unit: buyer,
                    contact_person: contact,
                    purchase_date: date,
                    order_number: orderId
                };
                
                console.log('✅ 使用字段映射保存第二行数据:', headerData);
            } else {
                // 如果没有字段映射，尝试使用硬编码的列（兼容旧版本）
                headerData[1] = { purchase_unit: buyer };
                headerData[3] = { contact_person: contact };
                headerData[5] = { purchase_date: date };
                headerData[7] = { order_number: orderId };
                
                console.log('⚠️ 没有字段映射，使用硬编码列保存第二行数据:', headerData);
            }
            
            editableData.header_row = headerData;
            
            // 获取产品数据
            const productRows = document.querySelectorAll('.product-row');
            productRows.forEach((row, index) => {
                const productData = {};
                
                // 明确获取每个字段的输入框，确保数据映射正确
                const modelInput = row.querySelector('input[name="productModel"]');
                const nameInput = row.querySelector('input[name="productName"]');
                const quantityBoxInput = row.querySelector('input[name="quantityBox"]');
                const specificationInput = row.querySelector('input[name="specification"]');
                const quantityKgInput = row.querySelector('input[name="quantityKg"]');
                const unitPriceInput = row.querySelector('input[name="unitPrice"]');
                const amountInput = row.querySelector('input[name="amount"]');
                const remarkInput = row.querySelector('input[name="remark"]');
                
                // 产品数据的列顺序固定
                // 对应关系：列1-型号，列4-名称，列5-数量/件，列6-规格/KG，列7-数量/KG，列8-单价/元，列9-金额/元，列10-备注
                productData[1] = modelInput ? modelInput.value : '';
                productData[4] = nameInput ? nameInput.value : '';
                productData[5] = quantityBoxInput ? quantityBoxInput.value : '';
                productData[6] = specificationInput ? specificationInput.value : '';
                productData[7] = quantityKgInput ? quantityKgInput.value : '';
                productData[8] = unitPriceInput ? unitPriceInput.value : '';
                productData[9] = amountInput ? amountInput.value : '';
                productData[10] = remarkInput ? remarkInput.value : '';
                
                editableData.product_rows.push(productData);
            });
            
            // 获取第十六行数据
            editableData.price_row[9] = document.getElementById('totalAmount').value;
            editableData.price_row[11] = document.getElementById('priceRemark').value;
            
            return editableData;
        }

        // 批量导入产品数据到数据库
        function importProductsToDatabase() {
            const productRows = document.querySelectorAll('.product-row');
            if (productRows.length === 0) {
                alert('没有找到产品数据');
                return;
            }
            
            const products = [];
            
            // 收集产品数据
            productRows.forEach((row, index) => {
                const modelInput = row.querySelector('input[name="productModel"]');
                const nameInput = row.querySelector('input[name="productName"]');
                
                const modelNumber = modelInput ? modelInput.value.trim() : '';
                const productName = nameInput ? nameInput.value.trim() : '';
                
                if (modelNumber && productName) {
                    products.push({
                        model_number: modelNumber,
                        name: productName,
                        specification: '',
                        price: 0,
                        quantity: 0,
                        description: '',
                        category: '从模板导入',
                        brand: '',
                        unit: '个',
                        is_active: true
                    });
                }
            });
            
            if (products.length === 0) {
                alert('没有有效的产品数据（型号和名称不能为空）');
                return;
            }
            
            if (confirm(`确定要导入 ${products.length} 个产品到数据库吗？`)) {
                showStatus(`正在导入 ${products.length} 个产品...`, 'processing');
                
                // 批量导入产品
                fetch('/products/batch', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        products: products
                    })
                })
                .then(response => response.json())
                .then(data => {
                    hideStatus();
                    if (data.success) {
                        showStatus(`成功导入 ${data.count} 个产品到数据库`, 'success');
                    } else {
                        showStatus(`导入失败: ${data.message}`, 'error');
                    }
                })
                .catch(error => {
                    hideStatus();
                    console.error('导入产品失败:', error);
                    showStatus('导入产品失败: 网络错误', 'error');
                });

        function handleProductKeydown(event, rowIndex) {

                event.preventDefault();

        // 产品型号输入改变时自动搜索匹配
        function onProductModelChange(input, rowIndex) {
            const modelNumber = input.value.trim();
            
            // 实时验证产品型号格式
            const regex = /^[a-zA-Z0-9]+$/;
            if (modelNumber && !regex.test(modelNumber)) {
                input.style.borderColor = '#e74c3c';
                input.title = '产品型号只能包含字母和数字';
            } else {
                input.style.borderColor = '';
                input.title = '';
            }
            
            // 当输入长度达到2个字符时，自动搜索匹配的产品名称
            if (modelNumber.length >= 2) {
                fetch(`/products/search?q=${encodeURIComponent(modelNumber)}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.success && data.data.length > 0) {
                            // 找到匹配的产品，自动填充产品名称
                            const product = data.data[0];
                            const productRow = document.querySelectorAll('.product-row')[rowIndex];
                            if (productRow) {
                                const nameInput = productRow.querySelector('input[name="productName"]');
                                if (nameInput && !nameInput.value) {
                                    nameInput.value = product.name || '';
                                }
                            }
                        }
                    })
                    .catch(error => {
                        console.error('搜索产品失败:', error);
                    });
            }
        }
        
        // 产品名称输入改变时自动搜索匹配
        function onProductNameChange(input, rowIndex) {
            const productName = input.value.trim();
            
            // 当输入长度达到2个字符时，自动搜索匹配的产品型号
            if (productName.length >= 2) {
                fetch(`/products/search?q=${encodeURIComponent(productName)}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.success && data.data.length > 0) {
                            // 找到匹配的产品，自动填充产品型号
                            const product = data.data[0];
                            const productRow = document.querySelectorAll('.product-row')[rowIndex];
                            if (productRow) {
                                const modelInput = productRow.querySelector('input[name="productModel"]');
                                if (modelInput && !modelInput.value) {
                                    modelInput.value = product.model_number || '';
                                }
                            }
                        }
                    })
                    .catch(error => {
                        console.error('搜索产品失败:', error);
                    });
            }
        }
        
        // 根据关键字（型号或名称）搜索产品
        function searchProductsByKeyword(keyword, rowIndex) {
            // 此函数仅用于选择器中的搜索，不再自动填充产品信息
            // 产品信息填充仅通过selectProduct函数处理
        }
        
        // 根据型号搜索产品（兼容旧代码）
        function searchProductsByModel(modelNumber, rowIndex) {
            searchProductsByKeyword(modelNumber, rowIndex);
        }
        
        // 填充产品数据
        function fillProductData(rowIndex, product) {
            const productRow = document.querySelectorAll('.product-row')[rowIndex];
            if (productRow) {
                const modelInput = productRow.querySelector('input[name="productModel"]');
                const nameInput = productRow.querySelector('input[name="productName"]');
                
                if (modelInput) {
                    // 保存当前值，避免触发不必要的输入事件
                    const currentModel = modelInput.value;
                    const newModel = product.model_number || '';
                    if (currentModel !== newModel) {
                        modelInput.value = newModel;
                    }
                }
                if (nameInput) {
                    // 保存当前值，避免触发不必要的输入事件
                    const currentName = nameInput.value;
                    const newName = product.name || '';
                    if (currentName !== newName) {
                        nameInput.value = newName;
                    }
                }
            }
        }
        
        // 打开产品选择器
        function openProductSelector(rowIndex, searchKeyword = null, fieldType = "both") {
            window.currentProductRowIndex = rowIndex;
            // 保存字段类型，用于后续填充逻辑
            window.currentFieldType = fieldType;
            
            // 获取当前行的数据
            const productRow = document.querySelectorAll('.product-row')[rowIndex];
            let currentModel = '';
            let currentName = '';
            
            if (productRow) {
                const modelInput = productRow.querySelector('input[name="productModel"]');
                const nameInput = productRow.querySelector('input[name="productName"]');
                currentModel = modelInput ? modelInput.value.trim() : '';
                currentName = nameInput ? nameInput.value.trim() : '';
            }
            
            // 确定搜索关键词：优先使用传入的关键词，其次是产品名称，最后是产品型号
            const keyword = searchKeyword || currentName || currentModel;
            
            // 创建产品选择器模态框
            createProductSelectorModal(keyword);
            
            // 加载产品列表（自动搜索）
            searchProductsWithKeyword(keyword);
        }
        
        // 从产品名称按钮打开产品选择器（使用产品名称和型号作为搜索关键词）
        function openProductSelectorByName(rowIndex) {
            const productRow = document.querySelectorAll('.product-row')[rowIndex];
            let currentModel = '';
            let currentName = '';
            
            if (productRow) {
                const modelInput = productRow.querySelector('input[name="productModel"]');
                const nameInput = productRow.querySelector('input[name="productName"]');
                currentModel = modelInput ? modelInput.value.trim() : '';
                currentName = nameInput ? nameInput.value.trim() : '';
            }
            
            // 构建搜索关键词：如果型号和名称都有，组合使用；否则使用其中一个
            let keyword = '';
            if (currentModel && currentName) {
                keyword = `${currentModel} ${currentName}`;
            } else if (currentName) {
                keyword = currentName;
            } else if (currentModel) {
                keyword = currentModel;
            }
            
            // 打开产品选择器，使用构建好的关键词，并指定fieldType为name
            openProductSelector(rowIndex, keyword, "name");
        }
        
        // 创建产品选择器模态框
        function createProductSelectorModal(searchKeyword = '') {
            // 检查模态框是否已存在
            let modal = document.getElementById('productSelectorModal');
            if (modal) {
                modal.remove();
            }
            
            modal = document.createElement('div');
            modal.id = 'productSelectorModal';
            modal.className = 'product-selector-modal';
            
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>选择产品</h3>
                        <button type="button" class="close-btn" onclick="closeProductSelector()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="search-section">
                            <input type="text" id="productSearchInput" placeholder="搜索产品型号或名称..." value="${searchKeyword || ''}">
                            <button type="button" class="btn-search" onclick="searchProductsForSelector()">搜索</button>
                            <button type="button" class="btn-add-new" onclick="showAddProductForm()">添加新产品</button>
                        </div>
                        <div class="products-list" id="productsList">
                            <!-- 产品列表将在这里显示 -->
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 添加搜索事件监听
            const searchInput = modal.querySelector('#productSearchInput');
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchProductsForSelector();
                }
            });
            
            // 回车键关闭
            modal.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeProductSelector();
                }
            });
        }
        
        // 关闭产品选择器
        function closeProductSelector() {
            const modal = document.getElementById('productSelectorModal');
            if (modal) {
                modal.remove();
            }
            window.currentProductRowIndex = null;
            window.currentFieldType = null; // 清理字段类型，避免影响后续操作
        }
        
        // 加载产品列表
        function loadProductsForSelector() {
            showProductLoading();
            
            fetch('/products')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        displayProductsList(data.data);
                    } else {
                        showProductError(data.message || '加载产品列表失败');
                    }
                })
                .catch(error => {
                    console.error('加载产品列表失败:', error);
                    showProductError('网络错误，请稍后重试');
                });
        }
        
        // 根据关键词搜索产品（用于选择器）
        function searchProductsWithKeyword(keyword) {
            if (!keyword) {
                loadProductsForSelector();
                return;
            }
            
            showProductLoading();
            
            fetch(`/products/search?q=${encodeURIComponent(keyword)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        displayProductsList(data.data);
                    } else {
                        showProductError(data.message || '搜索失败');
                    }
                })
                .catch(error => {
                    console.error('搜索产品失败:', error);
                    showProductError('搜索失败，请稍后重试');
                });
        }
        
        // 搜索产品（用于选择器）
        function searchProductsForSelector() {
            const query = document.getElementById('productSearchInput').value.trim();
            
            if (!query) {
                loadProductsForSelector();
                return;
            }
            
            showProductLoading();
            
            fetch(`/products/search?q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        displayProductsList(data.data);
                    } else {
                        showProductError(data.message || '搜索失败');
                    }
                })
                .catch(error => {
                    console.error('搜索产品失败:', error);
                    showProductError('搜索失败，请稍后重试');
                });
        }
        
        // 存储当前搜索到的产品列表，用于选择产品时获取完整信息
        let currentSearchProducts = [];
        
        // 显示产品列表
        function displayProductsList(products) {
            const listContainer = document.getElementById('productsList');
            if (!listContainer) return;
            
            // 保存当前搜索到的产品列表
            currentSearchProducts = products || [];
            
            if (!products || products.length === 0) {
                listContainer.innerHTML = '<div class="no-products">未找到匹配的产品</div>';
                return;
            }
            
            let html = '';
            products.forEach((product, index) => {
                html += `
                    <div class="product-item" onclick="selectProduct(${index})">
                        <div class="product-info">
                            <div class="product-name" style="font-weight: 600; color: #2c3e50; font-size: 16px;">${product.name || ''}</div>
                            <div class="product-model" style="color: #6c757d; font-size: 14px; margin-top: 2px;">型号: ${product.model_number || ''}</div>
                            <div class="product-specs" style="margin-top: 5px;">
                                ${product.specification ? `规格: ${product.specification}` : ''}
                                ${product.price ? ` | 价格: ¥${product.price}` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            listContainer.innerHTML = html;
        }
        
        // 选择产品
        function selectProduct(productIndex) {
            const rowIndex = window.currentProductRowIndex;
            if (rowIndex === null || rowIndex === undefined) return;
            
            // 从当前搜索列表中获取完整的产品信息
            const product = currentSearchProducts[productIndex];
            if (!product) {
                console.error('产品信息获取失败');
                return;
            }
            
            // 填充产品数据
            const productRow = document.querySelectorAll('.product-row')[rowIndex];
            if (productRow) {
                const modelInput = productRow.querySelector('input[name="productModel"]');
                const nameInput = productRow.querySelector('input[name="productName"]');
                
                // 无论从哪个按钮打开，都填充完整的产品信息
                if (modelInput) {
                    modelInput.value = product.model_number || '';
                }
                if (nameInput) {
                    nameInput.value = product.name || '';
                }
            }
            
            // 关闭选择器
            closeProductSelector();
        }
        
        // 显示产品加载状态
        function showProductLoading() {
            const listContainer = document.getElementById('productsList');
            if (listContainer) {
                listContainer.innerHTML = '<div class="loading">加载中...</div>';
            }
        }
        
        // 显示产品错误
        function showProductError(message) {
            const listContainer = document.getElementById('productsList');
            if (listContainer) {
                listContainer.innerHTML = `<div class="error">${message}</div>`;
            }
        }

                                <button type="submit" class="btn btn-success">添加产品</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 添加表单提交事件
            const form = modal.querySelector('#addProductForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 获取表单数据
                const modelNumber = modal.querySelector('#newProductModel').value.trim();
                const productName = modal.querySelector('#newProductName').value.trim();
                const specification = modal.querySelector('#newProductSpec').value.trim();
                const price = parseFloat(modal.querySelector('#newProductPrice').value || 0);
                const description = modal.querySelector('#newProductDesc').value.trim();
                
                if (!modelNumber || !productName) {
                    alert('产品型号和名称不能为空');
                    return;
                }
                
                const product = {
                    model_number: modelNumber,
                    name: productName,
                    specification: specification,
                    price: price,
                    quantity: 0,
                    description: description,
                    category: '手动添加',
                    brand: '',
                    unit: '个',
                    is_active: true
                };
                
                // 添加产品到数据库
                showStatus('正在添加产品...', 'processing');
                
                fetch('/products', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(product)
                })
                .then(response => response.json())
                .then(data => {
                    hideStatus();
                    if (data.success) {
                        // 添加成功后，填充到当前行
                        const rowIndex = window.currentProductRowIndex;
                        fillProductData(rowIndex, data.data);
                        
                        // 关闭模态框
                        closeAddProductModal();
                        closeProductSelector();
                        
                        showStatus(`产品 "${modelNumber} - ${productName}" 已添加到数据库`, 'success');
                        setTimeout(() => hideStatus(), 2000);
                    } else {
                        showStatus(`添加失败: ${data.message}`, 'error');
                    }
                })
                .catch(error => {
                    hideStatus();
                    console.error('添加产品失败:', error);
                    showStatus('添加产品失败: 网络错误', 'error');
                });
            });
        }

            if (modal) {
                modal.remove();
            }

                    }
                })
                .catch(error => {
                    console.error('更新购买单位失败:', error);
                    alert('更新购买单位失败: 网络错误');
                });
            });
        }
        
        // 关闭编辑购买单位模态框
        function closeEditPurchaseUnitModal() {
            const modal = document.getElementById('editPurchaseUnitModal');
            if (modal) {
                modal.remove();
            }
        }
        
        // 删除购买单位
        function deletePurchaseUnit(unitId) {
            if (confirm('确定要删除这个购买单位吗？此操作不可恢复。')) {
                fetch(`/purchase_units/${unitId}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('购买单位删除成功');
                        loadPurchaseUnits();
                    } else {
                        alert(`删除失败: ${data.message}`);
                    }
                })
                .catch(error => {
                    console.error('删除购买单位失败:', error);
                    alert('删除购买单位失败: 网络错误');
                });
            }
        }
        
        // ==================== 购买单位管理功能结束 ====================
        
        // ==================== 产品库功能结束 ====================
    </script>
</body>
</html>
