groups:
  - name: xcagi_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(api_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }}"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(api_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "P95 latency is {{ $value }}s"

      - alert: ServiceDown
        expr: up{job="xcagi-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "XCAGI backend is down"
          description: "Backend service has been down for more than 1 minute"

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes{pod=~"xcagi.*"} / container_spec_memory_limit_bytes{pod=~"xcagi.*"}) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total{pod=~"xcagi.*"}[5m]) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }}"

      - alert: CIRCUIT_BREAKER_OPEN
        expr: circuit_breaker_state > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker opened"
          description: "Circuit breaker {{ $labels.name }} is in open state"

      - alert: AIRquestFailure
        expr: rate(ai_request_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI request failures"
          description: "AI service {{ $labels.service }} has high failure rate"

      - alert: DatabaseConnectionFailure
        expr: rate(db_connection_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection failures"
          description: "Database connection errors detected"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 15%"
