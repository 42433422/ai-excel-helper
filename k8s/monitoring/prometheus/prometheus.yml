global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'xcagi-backend'
    static_configs:
      - targets: ['xcagi-backend:5000']
    metrics_path: '/metrics'

  - job_name: 'xcagi-frontend'
    static_configs:
      - targets: ['xcagi-frontend:80']

  - job_name: 'xcagi-db'
    static_configs:
      - targets: ['xcagi-db:5432']
