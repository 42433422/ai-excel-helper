server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/log/positions.yaml
  sync_period: 10s

client:
  url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: xcagi-backend
    static_configs:
      - targets: [localhost]
        labels:
          job: xcagi-backend
          __path__: /var/log/xcagi/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            logger: logger
            request_id: request_id
      - labels:
          level:
          logger:

  - job_name: xcagi-access
    static_configs:
      - targets: [localhost]
        labels:
          job: xcagi-access
          __path__: /var/log/xcagi/access.log
    pipeline_stages:
      - regex:
          expression: '^(?P<ip>\S+) - (?P<user>\S+) \[(?P<timestamp>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) (?P<protocol>\S+)" (?P<status>\d+) (?P<bytes>\S+)'
      - labels:
          method:
          path:
          status:
