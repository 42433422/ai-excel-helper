apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xcagi-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - xcagi.example.com
    secretName: xcagi-tls
  rules:
  - host: xcagi.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: xcagi-service
            port:
              number: 80