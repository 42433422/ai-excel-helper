name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Guard against temporary scripts in business directories
  guard-temp-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block new temporary scripts
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
            git fetch origin "${BASE_REF}" --depth=1
            ADDED_FILES="$(git diff --name-only --diff-filter=A "origin/${BASE_REF}"...HEAD || true)"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              ADDED_FILES="$(git ls-files)"
            else
              ADDED_FILES="$(git diff --name-only --diff-filter=A "${BEFORE_SHA}" "${{ github.sha }}" || true)"
            fi
          fi

          echo "Added files:"
          echo "${ADDED_FILES}"

          VIOLATIONS=""
          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            if [[ "${file}" == XCAGI/tools/* ]] || [[ "${file}" == XCAGI/archive/* ]]; then
              continue
            fi
            if [[ "${file}" =~ (^|/)产品文件夹/(fix_|check_|final_).+\.py$ ]] || \
               [[ "${file}" =~ ^(fix_|check_|final_).+\.py$ ]]; then
              VIOLATIONS+="${file}"$'\n'
            fi
          done <<< "${ADDED_FILES}"

          if [ -n "${VIOLATIONS}" ]; then
            echo "❌ Found forbidden new temporary scripts in business directories:"
            echo "${VIOLATIONS}"
            echo "Please move them to tools/ or archive/."
            exit 1
          fi
          echo "✅ Temporary script location guard passed."

  # Backend Tests & Quality
  backend-test:
    needs: guard-temp-scripts
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock black isort mypy flake8

      - name: Run Black formatter check
        run: black --check --diff XCAGI/app XCAGI/tests || true

      - name: Run isort check
        run: isort --check-only --diff XCAGI/app XCAGI/tests || true

      - name: Run Flake8 linting
        run: |
          flake8 XCAGI/app XCAGI/tests --max-line-length=120 --ignore=E501,W503,E203,E402 || true

      - name: Run tests with coverage
        run: |
          mkdir -p coverage
          python -m pytest XCAGI/ -v --cov=XCAGI/app --cov-report=xml --cov-report=html \
            --cov-report=term-missing || echo "Tests completed with some issues"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          name: xcagi-backend
          fail_ci_if_error: false

  # Security & Dependency Scanning
  security-scan:
    needs: guard-temp-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run security checks
        run: |
          pip install safety bandit
          safety check -r requirements.txt --full-report || true
          bandit -r XCAGI/app -ll --skip B101,B601,B110 || true

  # Docker Build & Push
  docker-build:
    needs: [backend-test, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./XCAGI/Dockerfile
          push: ${{ github.ref == format('refs/heads/{0}', 'main') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}

  # Release on tags
  release:
    needs: docker-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
