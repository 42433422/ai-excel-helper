name: XCAGI CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  guard-temp-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block new temporary scripts in business dirs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
            git fetch origin "${BASE_REF}" --depth=1
            ADDED_FILES="$(git diff --name-only --diff-filter=A "origin/${BASE_REF}"...HEAD || true)"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              ADDED_FILES="$(git ls-files)"
            else
              ADDED_FILES="$(git diff --name-only --diff-filter=A "${BEFORE_SHA}" "${{ github.sha }}" || true)"
            fi
          fi

          echo "Added files:"
          echo "${ADDED_FILES}"

          VIOLATIONS=""
          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            if [[ "${file}" == tools/* ]] || [[ "${file}" == archive/* ]]; then
              continue
            fi
            if [[ "${file}" =~ (^|/)产品文件夹/(fix_|check_|final_).+\.py$ ]] || \
               [[ "${file}" =~ ^(fix_|check_|final_).+\.py$ ]]; then
              VIOLATIONS+="${file}"$'\n'
            fi
          done <<< "${ADDED_FILES}"

          if [ -n "${VIOLATIONS}" ]; then
            echo "Found forbidden new temporary scripts in business directories:"
            echo "${VIOLATIONS}"
            echo "Please move them to tools/ (active) or archive/ (historical)."
            exit 1
          fi

          echo "Temporary script location guard passed."

  backend-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=app --cov-report=xml --cov-report=html -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: backend
          name: xcagi-backend
          fail_ci_if_error: false

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: |
          pip install flake8 black isort mypy
          pip install -r requirements.txt

      - name: Run Black
        run: black --check --diff app/ tests/

      - name: Run isort
        run: isort --check-only --diff app/ tests/

      - name: Run Flake8
        run: flake8 app/ tests/ --max-line-length=100 --ignore=E501,W503,E203

      - name: Run MyPy
        run: mypy app/ --ignore-missing-imports --no-error-summary || true

  backend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Run Bandit
        run: bandit -r app/ -ll --skip B101,B601 || true

      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt --full-report || true

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter
        working-directory: frontend
        run: npm run lint || true

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Run tests
        working-directory: frontend
        run: npm run test -- --run || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: false
          tags: xcagi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: xcagi-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
