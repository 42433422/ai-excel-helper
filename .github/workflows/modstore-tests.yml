name: MODstore tests

on:
  push:
    paths:
      - "MODstore/**"
      - ".github/workflows/modstore-tests.yml"
  pull_request:
    paths:
      - "MODstore/**"
      - ".github/workflows/modstore-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MODstore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[web,dev]"
      - name: Test
        run: pytest tests -q
      - name: Coverage (optional)
        run: pytest tests --cov=modman --cov=modstore_server --cov-report=term-missing -q
