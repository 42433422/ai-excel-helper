    tool_key: shipment_generate
    block_if_negated: true
    patterns:
      - ^发货单(.+?)\s*(\d+)\s*桶
      - ^送货单(.+?)\s*(\d+)\s*箱
      - ^出货单(.+?)\s*(\d+)\s*件

