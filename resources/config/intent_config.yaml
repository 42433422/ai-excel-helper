quick_rules:
  command_map:
    开单: shipment_generate
    开发货单: shipment_generate
    生成发货单: shipment_generate
    打单: shipment_generate
    查产品: products
    产品列表: products
    查客户: customers
    客户列表: customers
    发货单模板: shipment_template
    当前模板: shipment_template
    出货记录: shipments
    发货记录: shipments
    发微信: wechat_send
    发送微信: wechat_send
    打印标签: print_label
    打印: print_label
    上传: upload_file
    导入: upload_file
    导出: upload_file
    材料: materials
    原材料: materials
    库存: materials
    分解: excel_decompose
    分解excel: excel_decompose
    提取模板: template_extract
    导出模板: template_extract
    业务对接: business_docking
    模板预览: template_preview
    出货记录: shipment_records
    微信联系人: wechat
    联系人列表: wechat
    打印机列表: printer_list
    系统设置: settings
    工具表: tools_table
    其他工具: other_tools
    ai生态: ai_ecosystem
    AI生态: ai_ecosystem
  intent_patterns:
    - pattern: '^发货单[^\s]{2,10}\s*\d+[桶箱件个]'
      intent: shipment_generate
    - pattern: '^送货单[^\s]{2,10}\s*\d+[桶箱件个]'
      intent: shipment_generate
    - pattern: '^出货单[^\s]{2,10}\s*\d+[桶箱件个]'
      intent: shipment_generate
    - pattern: '发货单.*桶.*规格'
      intent: shipment_generate
    - pattern: '开单.*[一二三四五六七八九十零〇\d]+.*桶'
      intent: shipment_generate
    - pattern: '打印.*\d+.*规格'
      intent: shipment_generate
  context_inherit_patterns:
    - pattern: '^再[一1]份$'
      action: repeat_last
    - pattern: '^再.*[一1]份$'
      action: repeat_last
    - pattern: '^同样$'
      action: repeat_last
    - pattern: '^一样$'
      action: repeat_last
    - pattern: '^按上次的$'
      action: repeat_last
    - pattern: '^和上次一样$'
      action: repeat_last
  append_keywords:
    - 再加
    - 还要
    - 再加1
    - 再来
    - 继续加
    - 再补
    - 追加
    - 额外
    - 加上

